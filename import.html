function startImport() {
  var token = localStorage.getItem("arcave_token");
  if (!token) {
    document.getElementById("status").innerHTML = "<span class='err'>Not logged in. Log in on arcave21.github.io/arcave21 first, then come back here.</span>";
    return;
  }
  var btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Importing...";
  document.getElementById("status").textContent = "Sending " + DATA.length + " books...";

  fetch(API + "/api/books/import", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({books: DATA})
  })
  .then(function(r){ return r.json() })
  .then(function(data){
    if (data.error) throw new Error(data.error);
    document.getElementById("status").innerHTML = "<span class='done'>Done! Imported " + data.imported + " books. " + (data.skipped ? data.skipped + " already existed." : "") + " Go back to arcave and refresh!</span>";
    btn.textContent = "Done!";
  })
  .catch(function(e){
    document.getElementById("status").innerHTML = "<span class='err'>Error: " + e.message + "</span>";
    btn.disabled = false;
    btn.textContent = "Try again";
  });
}
</script>
