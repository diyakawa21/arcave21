<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arcave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Graphik:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #14181c;
  --bg2: #1c2228;
  --bg3: #242c36;
  --border: #2c3440;
  --text: #9ab;
  --text2: #678;
  --white: #fff;
  --green: #00e054;
  --orange: #c4783a;
  --accent: #40bcf4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; min-height: 100vh; }

/* AUTH */
.auth-screen { display:none; position:fixed; inset:0; z-index:500; background:var(--bg); align-items:center; justify-content:center; }
.auth-screen.active { display:flex; }
.auth-box { width:100%; max-width:360px; padding:0 20px; }
.auth-logo { font-family:"EB Garamond",serif; font-size:32px; font-style:italic; color:var(--white); margin-bottom:4px; }
.auth-sub { font-size:12px; color:var(--text2); margin-bottom:32px; letter-spacing:.05em; text-transform:uppercase; }
.auth-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:24px; }
.auth-tab { font-size:12px; text-transform:uppercase; letter-spacing:.08em; font-weight:600; padding:8px 16px; cursor:pointer; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
.auth-tab.active { color:var(--white); border-bottom-color:var(--orange); }
.auth-form { display:flex; flex-direction:column; gap:12px; }
.auth-field input { width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:4px; color:var(--white); font-size:14px; padding:10px 14px; outline:none; transition:border-color .2s; }
.auth-field input:focus { border-color:var(--orange); }
.auth-field input::placeholder { color:var(--text2); }
.auth-btn { background:var(--orange); border:none; border-radius:4px; color:#fff; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; padding:11px; cursor:pointer; }
.auth-btn:hover { opacity:.9; }
.auth-error { font-size:12px; color:#f00; background:rgba(255,0,0,.08); border:1px solid rgba(255,0,0,.2); border-radius:3px; padding:8px 12px; display:none; margin-bottom:4px; }
.auth-error.show { display:block; }

/* NAV */
nav { background:var(--bg2); border-bottom:1px solid var(--border); height:52px; display:flex; align-items:center; padding:0 24px; gap:24px; position:sticky; top:0; z-index:100; }
.nav-logo { font-family:"EB Garamond",serif; font-style:italic; font-size:22px; color:var(--white); letter-spacing:-.01em; }
.nav-links { display:flex; gap:16px; }
.nav-link { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text2); cursor:pointer; transition:color .15s; padding:4px 0; border-bottom:2px solid transparent; }
.nav-link:hover { color:var(--white); }
.nav-link.active { color:var(--white); border-bottom-color:var(--orange); }
.nav-search { flex:1; max-width:280px; position:relative; }
.nav-search input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:20px; color:var(--white); font-size:12px; padding:7px 14px 7px 32px; outline:none; transition:border-color .2s; }
.nav-search input:focus { border-color:var(--text2); }
.nav-search input::placeholder { color:var(--text2); }
.nav-search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text2); font-size:13px; pointer-events:none; }
.nav-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.nav-username { font-size:12px; font-weight:600; color:var(--white); text-transform:uppercase; letter-spacing:.06em; }
.nav-signout { font-size:11px; color:var(--text2); cursor:pointer; }
.nav-signout:hover { color:var(--white); }

/* FILTERS BAR */
.filters-bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; gap:4px; height:44px; overflow-x:auto; }
.filter-btn { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; padding:5px 12px; border-radius:3px; cursor:pointer; background:none; border:1px solid transparent; color:var(--text2); transition:all .15s; white-space:nowrap; }
.filter-btn:hover { color:var(--white); border-color:var(--border); }
.filter-btn.active { background:var(--orange); color:#fff; border-color:var(--orange); }
.filters-sep { width:1px; height:20px; background:var(--border); margin:0 8px; flex-shrink:0; }
.sort-select { background:transparent; border:none; color:var(--text2); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; outline:none; cursor:pointer; margin-left:auto; }
.sort-select option { background:var(--bg2); }

/* STATS */
.stats-row { padding:16px 24px 0; display:flex; gap:24px; align-items:center; }
.stat-item { display:flex; flex-direction:column; gap:1px; }
.stat-num { font-size:22px; font-weight:700; color:var(--white); line-height:1; }
.stat-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); }
.stat-num.green { color:var(--green); }
.stat-num.amber { color:#f0c040; }
.stat-num.purple { color:#b07ec8; }
.stats-divider { width:1px; height:32px; background:var(--border); }
.cover-fetch-bar { margin:12px 24px 0; }
.fetch-progress { height:2px; background:var(--border); border-radius:1px; overflow:hidden; display:none; }
.fetch-progress.active { display:block; }
.fetch-progress-fill { height:100%; background:var(--orange); transition:width .3s; width:0; border-radius:1px; }
.fetch-label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }

/* GRID */
main { padding:20px 24px 80px; }
.result-count { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px; }
.poster-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(108px,1fr)); gap:12px 8px; }
.poster-card { position:relative; cursor:pointer; }
.poster-wrap { position:relative; border-radius:4px; overflow:hidden; background:var(--bg3); aspect-ratio:2/3; }
.poster-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .2s; }
.poster-card:hover .poster-wrap img { opacity:.7; }
.poster-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; text-align:center; position:absolute; inset:0; }
.poster-ph-title { font-family:"EB Garamond",serif; font-style:italic; font-size:11px; line-height:1.3; color:rgba(255,255,255,.85); margin-bottom:4px; }
.poster-ph-author { font-size:8px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.05em; }
/* hover overlay */
.poster-overlay { position:absolute; inset:0; background:rgba(20,24,28,.85); opacity:0; transition:opacity .2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; border-radius:4px; }
.poster-card:hover .poster-overlay { opacity:1; }
.overlay-title { font-size:11px; font-weight:600; color:#fff; text-align:center; padding:0 8px; line-height:1.3; }
.overlay-author { font-size:9px; color:var(--text); text-align:center; padding:0 8px; }
/* badges */
.badge-status { position:absolute; top:5px; right:5px; z-index:2; }
.badge-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid rgba(0,0,0,.5); }
.badge-dot.read { background:var(--green); }
.badge-dot.reading { background:#f0c040; }
.badge-dot.unread { background:rgba(255,255,255,.15); }
.badge-owned { position:absolute; top:5px; left:5px; z-index:2; width:8px; height:8px; border-radius:50%; background:#b07ec8; border:1.5px solid rgba(0,0,0,.5); }
.badge-reread { position:absolute; bottom:5px; left:5px; z-index:2; background:var(--orange); color:#fff; font-size:7px; font-weight:700; padding:1px 4px; border-radius:2px; }
/* star row */
.poster-stars { margin-top:5px; display:flex; gap:1px; justify-content:center; }
.pstar { font-size:9px; color:rgba(255,255,255,.15); cursor:pointer; line-height:1; }
.pstar.filled { color:#f0c040; }
.poster-stars:hover .pstar { color:#f0c040; }
.poster-stars .pstar:hover ~ .pstar { color:rgba(255,255,255,.15) !important; }

/* palettes */
.pp-0{background:linear-gradient(160deg,#1a2a4a,#0d1a30)}
.pp-1{background:linear-gradient(160deg,#2a1515,#1a0808)}
.pp-2{background:linear-gradient(160deg,#152a15,#081a08)}
.pp-3{background:linear-gradient(160deg,#2a2010,#1a1408)}
.pp-4{background:linear-gradient(160deg,#15153a,#080825)}
.pp-5{background:linear-gradient(160deg,#251525,#180d18)}
.pp-6{background:linear-gradient(160deg,#152525,#081818)}
.pp-7{background:linear-gradient(160deg,#2a1a08,#1a1005)}
.pp-8{background:linear-gradient(160deg,#1a1228,#100a1a)}
.pp-9{background:linear-gradient(160deg,#082018,#051510)}

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(14,18,22,.9); backdrop-filter:blur(8px); align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:8px; max-width:720px; width:100%; display:flex; flex-direction:column; }
.modal-hero { display:flex; gap:0; border-radius:8px 8px 0 0; overflow:hidden; }
.modal-poster { width:140px; flex-shrink:0; }
.modal-poster img { width:100%; height:210px; object-fit:cover; display:block; }
.modal-poster-ph { width:140px; height:210px; display:flex; align-items:center; justify-content:center; font-family:"EB Garamond",serif; font-style:italic; font-size:12px; color:rgba(255,255,255,.6); text-align:center; padding:12px; }
.modal-info { flex:1; padding:24px; background:linear-gradient(to right,var(--bg3),var(--bg2)); }
.modal-title { font-family:"EB Garamond",serif; font-style:italic; font-size:26px; color:#fff; line-height:1.15; margin-bottom:4px; }
.modal-author { font-size:13px; color:var(--text2); margin-bottom:4px; }
.modal-meta { font-size:11px; color:var(--text2); margin-bottom:16px; }
.modal-genre-pill { display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--orange); background:rgba(196,120,58,.1); border:1px solid rgba(196,120,58,.2); border-radius:20px; padding:2px 8px; margin-bottom:14px; }
.modal-controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
.status-pill { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:4px 12px; border-radius:20px; cursor:pointer; border:1.5px solid; transition:all .15s; }
.status-pill.read { background:rgba(0,224,84,.1); color:var(--green); border-color:rgba(0,224,84,.3); }
.status-pill.reading { background:rgba(240,192,64,.1); color:#f0c040; border-color:rgba(240,192,64,.3); }
.status-pill.unread { background:rgba(154,187,204,.05); color:var(--text); border-color:var(--border); }
.status-pill:hover { opacity:.75; }
.owned-btn { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:4px 12px; border-radius:20px; cursor:pointer; border:1.5px solid var(--border); background:none; color:var(--text2); transition:all .15s; }
.owned-btn.active { background:rgba(176,126,200,.1); color:#b07ec8; border-color:rgba(176,126,200,.3); }
.reread-badge-modal { font-size:10px; color:var(--orange); }
.modal-stars { display:flex; gap:4px; }
.modal-star { font-size:22px; cursor:pointer; color:rgba(255,255,255,.1); transition:color .1s; }
.modal-star.filled { color:#f0c040; }
.modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
.field-group label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); margin-bottom:5px; }
.field-group input[type=text], .field-group textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:4px; color:#fff; font-size:14px; padding:9px 12px; outline:none; resize:vertical; transition:border-color .2s; font-family:inherit; line-height:1.5; }
.field-group input[type=text]:focus, .field-group textarea:focus { border-color:var(--orange); }
.gr-box { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:10px 12px; font-style:italic; font-size:13px; color:var(--text2); line-height:1.6; }
.dates-row { display:flex; gap:12px; }
.dates-row .field-group { flex:1; }
.modal-footer { padding:14px 24px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.btn { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; padding:8px 16px; border-radius:4px; cursor:pointer; border:1px solid; transition:all .15s; }
.btn-ghost { background:none; border-color:var(--border); color:var(--text); }
.btn-ghost:hover { border-color:var(--text); color:#fff; }
.btn-primary { background:var(--orange); border-color:var(--orange); color:#fff; }
.btn-primary:hover { opacity:.9; }
.btn-reread { background:none; border-color:rgba(196,120,58,.3); color:var(--orange); }
.btn-danger { background:none; border-color:rgba(255,80,80,.2); color:#f05050; margin-right:auto; }

/* JOURNAL */
#journalView { display:none; padding:20px 24px 80px; max-width:760px; }
.journal-header { margin-bottom:24px; }
.journal-title { font-family:"EB Garamond",serif; font-style:italic; font-size:28px; color:#fff; margin-bottom:4px; }
.journal-subtitle { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }
.journal-composer { background:var(--bg2); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-bottom:28px; }
.journal-composer:focus-within { border-color:rgba(196,120,58,.4); }
.composer-top { padding:12px 16px 0; display:flex; align-items:center; gap:10px; }
.composer-top label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }
.composer-top select { background:var(--bg); border:1px solid var(--border); border-radius:3px; color:var(--text); font-size:11px; padding:4px 8px; outline:none; cursor:pointer; max-width:240px; }
.composer-textarea { width:100%; background:transparent; border:none; color:#fff; font-size:15px; padding:14px 16px; outline:none; resize:none; line-height:1.65; min-height:110px; font-family:"EB Garamond",serif; }
.composer-textarea::placeholder { color:var(--text2); }
.composer-footer { padding:8px 12px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.composer-char { font-size:10px; color:var(--text2); align-self:center; margin-right:auto; }
.j-entry { background:var(--bg2); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-bottom:12px; }
.j-entry:hover { border-color:var(--bg3); }
.j-meta { padding:12px 16px 0; display:flex; align-items:center; gap:10px; }
.j-date { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.07em; }
.j-book { font-size:10px; color:var(--orange); background:rgba(196,120,58,.08); border:1px solid rgba(196,120,58,.15); border-radius:20px; padding:2px 8px; }
.j-actions { margin-left:auto; display:flex; gap:6px; opacity:0; transition:opacity .15s; }
.j-entry:hover .j-actions { opacity:1; }
.j-act { font-size:10px; background:none; border:1px solid var(--border); border-radius:3px; color:var(--text2); padding:3px 7px; cursor:pointer; }
.j-act:hover { color:#fff; border-color:var(--text2); }
.j-act.del:hover { color:#f05050; border-color:#f05050; }
.j-content { padding:10px 16px 16px; font-size:15px; line-height:1.7; color:#fff; white-space:pre-wrap; word-break:break-word; font-family:"EB Garamond",serif; }
.j-edit { width:100%; background:transparent; border:none; border-top:1px solid var(--border); color:#fff; font-family:"EB Garamond",serif; font-size:15px; padding:12px 16px; outline:none; resize:none; display:none; }
.j-edit-footer { padding:8px 12px; border-top:1px solid var(--border); display:none; justify-content:flex-end; gap:8px; }
.j-day-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.1em; margin:20px 0 10px; font-weight:600; }

/* ADD METHOD */
.add-method-overlay { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.8); backdrop-filter:blur(6px); align-items:center; justify-content:center; }
.add-method-overlay.open { display:flex; }
.add-method-box { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:28px; max-width:320px; width:90%; text-align:center; }
.add-method-title { font-family:"EB Garamond",serif; font-style:italic; font-size:22px; color:#fff; margin-bottom:4px; }
.add-method-sub { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.07em; margin-bottom:22px; }
.add-method-btns { display:flex; flex-direction:column; gap:8px; }
.m-btn { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; padding:12px; border-radius:4px; cursor:pointer; border:1px solid; transition:all .15s; }
.m-scan { background:var(--orange); border-color:var(--orange); color:#fff; }
.m-scan:hover { opacity:.9; }
.m-isbn, .m-manual { background:none; border-color:var(--border); color:var(--text); }
.m-isbn:hover, .m-manual:hover { border-color:var(--text); color:#fff; }
.m-cancel { margin-top:10px; font-size:11px; color:var(--text2); background:none; border:none; cursor:pointer; }
.m-cancel:hover { color:#fff; }

/* SCANNER */
.scanner-overlay { display:none; position:fixed; inset:0; z-index:300; background:#000; flex-direction:column; align-items:center; justify-content:center; }
.scanner-overlay.open { display:flex; }
.scanner-video { width:100%; max-width:480px; border-radius:8px; }
.scanner-frame { position:absolute; width:240px; height:110px; border:2px solid var(--orange); border-radius:4px; box-shadow:0 0 0 9999px rgba(0,0,0,.65); }
.scanner-line { position:absolute; top:0; left:0; right:0; height:2px; background:var(--orange); animation:scan 2s linear infinite; }
@keyframes scan{0%{top:0}100%{top:100%}}
.scanner-label { margin-top:20px; font-size:12px; color:var(--text); text-transform:uppercase; letter-spacing:.1em; }
.scanner-close-btn { margin-top:14px; font-size:11px; background:none; border:1px solid var(--border); border-radius:3px; color:var(--text2); padding:6px 16px; cursor:pointer; }
.scanner-close-btn:hover { border-color:var(--text); color:#fff; }
.book-preview { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:16px; max-width:380px; width:90%; margin-top:16px; display:none; }
.book-preview.show { display:flex; gap:12px; }
.preview-cover { width:56px; height:84px; object-fit:cover; border-radius:3px; flex-shrink:0; }
.preview-info { flex:1; }
.preview-title { font-size:14px; font-style:italic; color:#fff; margin-bottom:3px; font-family:"EB Garamond",serif; }
.preview-author { font-size:11px; color:var(--text2); margin-bottom:10px; }
.preview-btns { display:flex; gap:8px; }

/* FAB */
.fab-wrap { position:fixed; bottom:24px; right:24px; z-index:150; display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
.fab { width:48px; height:48px; border-radius:50%; background:var(--orange); border:none; cursor:pointer; color:#fff; font-size:22px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(196,120,58,.4); transition:transform .2s; }
.fab:hover { transform:scale(1.08); }
.fab-export { font-size:10px; background:rgba(20,24,28,.9); border:1px solid var(--border); color:var(--text2); padding:5px 10px; border-radius:3px; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; }
.fab-export:hover { color:#fff; border-color:var(--text2); }

.empty { padding:60px 0; text-align:center; color:var(--text2); font-style:italic; font-size:18px; }
.loading { padding:60px 0; text-align:center; color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:.1em; }

::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
@media(max-width:600px) { nav{padding:0 12px;gap:12px} .nav-links{display:none} .poster-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))} main{padding:16px 12px 80px} }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen active" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">arcave</div>
    <div class="auth-sub">your personal library</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign in</div>
      <div class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create account</div>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-form" id="loginForm">
      <div class="auth-field"><input type="text" id="loginUser" placeholder="Username" autocomplete="username"></div>
      <div class="auth-field"><input type="password" id="loginPass" placeholder="Password" autocomplete="current-password"></div>
      <button class="auth-btn" onclick="doLogin()">Sign in</button>
    </div>
    <div class="auth-form" id="signupForm" style="display:none">
      <div class="auth-field"><input type="text" id="signupUser" placeholder="Username (letters, numbers, underscores)" autocomplete="username"></div>
      <div class="auth-field"><input type="password" id="signupPass" placeholder="Password (min 6 chars)" autocomplete="new-password"></div>
      <div class="auth-field"><input type="text" id="signupEmail" placeholder="Email (optional)"></div>
      <button class="auth-btn" onclick="doSignup()">Create account</button>
    </div>
  </div>

var PALETTES = ["pp-0","pp-1","pp-2","pp-3","pp-4","pp-5","pp-6","pp-7","pp-8","pp-9"];

function hc(s){var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return PALETTES[Math.abs(h)%PALETTES.length]}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
function fmtTime(iso){if(!iso)return"";return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}

function assignGenre(b){
  if(b.genre&&b.genre.trim())return b.genre.trim();
  var h=((b.title||"")+" "+(b.author||"")).toLowerCase();
  for(var g in GENRE_RULES){var ks=GENRE_RULES[g];for(var k=0;k<ks.length;k++)if(h.indexOf(ks[k])>-1)return g}
  return "Unsorted";
}

// LOAD
function loadAll(){
  document.getElementById("posterGrid").innerHTML="<div class='loading'>Loading your library...</div>";

    books=r[0];journalEntries=r[1];
    renderStats();renderGrid();renderJournal();populateBookSelect();
    autoFetchCovers();
  }).catch(function(e){
    if(e.message.indexOf("expired")>-1||e.message.indexOf("Invalid")>-1)logout();
    else document.getElementById("posterGrid").innerHTML="<div class='empty'>Could not load. Check connection.</div>";
  });
}

// AUTO-FETCH COVERS
function autoFetchCovers(){
  var missing=books.filter(function(b){return !b.cover&&!coverCache[b.id]});
  if(!missing.length)return;
  var label=document.getElementById("fetchLabel");
  var progress=document.getElementById("fetchProgress");
  var fill=document.getElementById("fetchFill");
  label.style.display="block";
  progress.classList.add("active");
  var total=missing.length,done=0;
  label.textContent="Fetching covers for "+total+" books...";

  function fetchNext(i){
    if(i>=missing.length){
      label.style.display="none";progress.classList.remove("active");
      return;
    }
    var b=missing[i];
    var query=encodeURIComponent((b.title||"")+" "+(b.author||""));
    fetch("https://www.googleapis.com/books/v1/volumes?q="+query+"&maxResults=1").then(function(r){return r.json()}).then(function(data){
      if(data.items&&data.items[0]){
        var info=data.items[0].volumeInfo;
        var cover=(info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail))||"";
        if(cover){
          cover=cover.replace("http://","https://");
          coverCache[b.id]=cover;
          // update in books array
          var idx=books.findIndex(function(bk){return bk.id===b.id});
          if(idx>-1) books[idx].cover=cover;
          // update card image if visible
          var img=document.querySelector(".poster-card[data-id='"+b.id+"'] .poster-wrap img");
          if(img){img.src=cover;img.style.display="block";var ph=img.nextElementSibling;if(ph)ph.style.display="none"}
          // save to backend silently
          api("PATCH","/api/books/"+b.id,{cover:cover}).catch(function(){});
        }
      }
    }).catch(function(){}).then(function(){
      done++;
      fill.style.width=(done/total*100)+"%";
      label.textContent="Fetching covers... "+done+"/"+total;
      // throttle: 1 request per 200ms
      setTimeout(function(){fetchNext(i+1)},200);
    });
  }
  fetchNext(0);
}

// FILTER/SORT
function getFiltered(){
  var list=books.map(function(b,i){return Object.assign({},b,{_i:i})});
  if(currentFilter==="owned")list=list.filter(function(b){return b.owned});
  else if(currentFilter==="unowned")list=list.filter(function(b){return !b.owned});
  else if(currentFilter!=="all")list=list.filter(function(b){return b.status===currentFilter});
  if(currentSearch){var q=currentSearch.toLowerCase();list=list.filter(function(b){return(b.title||"").toLowerCase().indexOf(q)>-1||(b.author||"").toLowerCase().indexOf(q)>-1})}
  list.sort(function(a,b){
    if(currentSort==="author")return(a.author||"").localeCompare(b.author||"");
    if(currentSort==="title")return(a.title||"").localeCompare(b.title||"");
    if(currentSort==="rating")return(b.rating||0)-(a.rating||0);
    if(currentSort==="year")return(b.year||"0").localeCompare(a.year||"0");
    if(currentSort==="status"){var o={read:0,reading:1,unread:2};return(o[a.status]||2)-(o[b.status]||2)}
    return 0;
  });
  return list;
}

// STATS
function renderStats(){
  document.getElementById("sTotal").textContent=books.length;
  document.getElementById("sRead").textContent=books.filter(function(b){return b.status==="read"}).length;
  document.getElementById("sReading").textContent=books.filter(function(b){return b.status==="reading"}).length;
  document.getElementById("sOwned").textContent=books.filter(function(b){return b.owned}).length;
  var rated=books.filter(function(b){return b.rating>0});
  document.getElementById("sRated").textContent=rated.length;
  document.getElementById("sAvg").textContent=rated.length?(rated.reduce(function(s,b){return s+b.rating},0)/rated.length).toFixed(1):"-";
}

    var ph=hc((b.title||"")+(b.author||""));
    var rc=b.read_count||0;
    var hasImg=b.cover||coverCache[b.id];
    var imgSrc=b.cover||(coverCache[b.id]||"");

    if(b.owned)html+="<div class='badge-owned'></div>";

    html+="<div class='poster-overlay'><div class='overlay-title'>"+esc(b.title)+"</div><div class='overlay-author'>"+esc(b.author)+"</div></div>";
    html+="</div>";
    html+="<div class='poster-stars' data-i='"+b._i+"'>"+stars+"</div>";

    "<div class='modal-controls'>"+
    "<span class='status-pill "+(b.status||"unread")+"' id='statusPill' onclick='cycleStatus()'>"+({read:"Read",reading:"Reading",unread:"Unread"}[b.status]||b.status)+"</span>"+
    "<button class='owned-btn "+(b.owned?"active":"")+"' id='ownedBtn' onclick='toggleOwned()'>"+(b.owned?"Owned":"Not owned")+"</button>"+
    (rc>1?"<span class='reread-badge-modal'>Read x"+rc+"</span>":"")+
    "</div>"+
    "<div class='modal-stars' id='modalStars'>"+stars+"</div>"+
    "</div></div>";
  var gr=b.gr_review||"";
  document.getElementById("modalBody").innerHTML=
    "<div class='field-group'><label>Cover URL</label><input type='text' id='mCover' value='"+esc(imgSrc)+"' placeholder='https://...'></div>"+
    "<div class='field-group'><label>Genre</label><input type='text' id='mGenre' value='"+esc(b.genre||"")+"' placeholder='Fiction, Romance...'></div>"+
    "<div class='dates-row'><div class='field-group'><label>Started</label><input type='text' id='mStart' value='"+esc(b.start_date||"")+"'></div><div class='field-group'><label>Finished</label><input type='text' id='mFinish' value='"+esc(b.finish_date||"")+"'></div></div>"+
    "<div class='field-group'><label>Notes while reading</label><textarea id='mNotesD' rows='3'>"+esc(b.notes_during||"")+"</textarea></div>"+
    "<div class='field-group'><label>Notes after finishing</label><textarea id='mNotesA' rows='3'>"+esc(b.notes_after||"")+"</textarea></div>"+
    (gr?"<div><div style='font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px'>Goodreads note</div><div class='gr-box'>"+esc(gr)+"</div></div>":"");
  document.getElementById("modalFooter").innerHTML=
    (isNew?"":"<button class='btn btn-danger' onclick='deleteBook()'>Delete</button>")+
    (b.status==="read"?"<button class='btn btn-reread' onclick='markReread()'>Mark Reread</button>":"")+
    "<button class='btn btn-ghost' onclick='closeModal()'>Cancel</button>"+
    "<button class='btn btn-primary' onclick='saveModal()'>Save</button>";
  document.getElementById("modalStars").addEventListener("click",function(e){
    var v=parseInt(e.target.getAttribute("data-v"));if(!v)return;
    books[openIdx].rating=books[openIdx].rating===v?0:v;
    document.querySelectorAll(".modal-star").forEach(function(s,i){s.classList.toggle("filled",i<books[openIdx].rating)});
  });
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(){document.getElementById("modalOverlay").classList.remove("open");openIdx=null}
function cycleStatus(){
  if(openIdx===null)return;
  var c=["unread","reading","read"],i=c.indexOf(books[openIdx].status||"unread");
  books[openIdx].status=c[(i+1)%c.length];
  var pill=document.getElementById("statusPill");
  pill.textContent={read:"Read",reading:"Reading",unread:"Unread"}[books[openIdx].status];
  pill.className="status-pill "+books[openIdx].status;
}
function toggleOwned(){
  if(openIdx===null)return;
  books[openIdx].owned=!books[openIdx].owned;
  var btn=document.getElementById("ownedBtn");
  btn.textContent=books[openIdx].owned?"Owned":"Not owned";
  btn.className="owned-btn "+(books[openIdx].owned?"active":"");
}
function saveModal(){
  if(openIdx===null)return;
  var b=books[openIdx];
  var coverVal=document.getElementById("mCover").value.trim();
  var u={cover:coverVal,genre:document.getElementById("mGenre").value.trim(),start_date:document.getElementById("mStart").value.trim(),finish_date:document.getElementById("mFinish").value.trim(),notes_during:document.getElementById("mNotesD").value.trim(),notes_after:document.getElementById("mNotesA").value.trim(),status:b.status,owned:b.owned||false,rating:b.rating||0};
  if(u.finish_date&&b.status==="reading")u.status="read";
  if(coverVal)coverCache[b.id]=coverVal;
  api("PATCH","/api/books/"+b.id,u).then(function(updated){
    books[openIdx]=Object.assign({},b,updated);
    renderStats();renderGrid();closeModal();
  }).catch(function(e){alert("Save failed: "+e.message)});
}
function markReread(){
  if(openIdx===null)return;
  var b=books[openIdx];var rc=(b.read_count||1)+1;
  api("PATCH","/api/books/"+b.id,{read_count:rc}).then(function(){books[openIdx].read_count=rc;renderStats();renderGrid();closeModal()}).catch(function(e){alert(e.message)});
}
function deleteBook(){
  if(openIdx===null)return;
  if(!confirm("Remove this book?"))return;
  api("DELETE","/api/books/"+books[openIdx].id).then(function(){books.splice(openIdx,1);renderStats();renderGrid();closeModal()}).catch(function(e){alert(e.message)});
}

// ADD
function openAddMethod(){document.getElementById("addMethodOverlay").classList.add("open")}
function closeAddMethod(){document.getElementById("addMethodOverlay").classList.remove("open")}
function addManually(){closeAddMethod();openAddModal()}
function openAddModal(){
  var title=prompt("Book title:");if(!title)return;title=title.trim();
  var dup=books.find(function(b){return(b.title||"").toLowerCase()===title.toLowerCase()});
  if(dup){alert(dup.title+" is already in your library.");return}
  var author=prompt("Author:");if(author===null)return;
  var sc=prompt("Status: 1=Unread, 2=Reading, 3=Read","1");
  var statMap={"1":"unread","2":"reading","3":"read"};
  var status=statMap[(sc||"1").trim()]||"unread";
  var oa=prompt("Do you own this book? y/n","y");
  var owned=oa&&oa.toLowerCase().indexOf("y")>-1;
  api("POST","/api/books",{title:title,author:author.trim(),status:status,owned:owned,read_count:status==="read"?1:0,rating:0}).then(function(nb){
    books.push(nb);renderStats();renderGrid();populateBookSelect();
    openModal(books.length-1,true);
  }).catch(function(e){alert("Failed: "+e.message)});
}

// SCANNER
function openScanner(){
  closeAddMethod();
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert("Camera not available. Use Type ISBN instead.");return}
  document.getElementById("scannerOverlay").classList.add("open");
  scannedBookData=null;
  document.getElementById("bookPreview").classList.remove("show");
  document.getElementById("scannerLabel").textContent="Point camera at the barcode";
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(function(stream){
    scannerStream=stream;var video=document.getElementById("scannerVideo");
    video.srcObject=stream;video.play();
    scannerInterval=setInterval(function(){scanFrame(video)},300);
  }).catch(function(e){alert("Camera error: "+e.message);closeScanner()});
}
function closeScanner(){
  if(scannerStream)scannerStream.getTracks().forEach(function(t){t.stop()});
  if(scannerInterval)clearInterval(scannerInterval);
  scannerStream=null;scannerInterval=null;scannedBookData=null;
  document.getElementById("scannerOverlay").classList.remove("open");
  document.getElementById("bookPreview").classList.remove("show");
}
function resetScanner(){
  document.getElementById("bookPreview").classList.remove("show");
  document.getElementById("scannerLabel").textContent="Point camera at the barcode";
  scannedBookData=null;
  if(scannerStream&&!scannerInterval)scannerInterval=setInterval(function(){scanFrame(document.getElementById("scannerVideo"))},300);
}
function scanFrame(video){
  if(!video.videoWidth)return;
  scanCanvas.width=video.videoWidth;scanCanvas.height=video.videoHeight;
  scanCtx.drawImage(video,0,0);
  if(window.BarcodeDetector){
    new BarcodeDetector({formats:["ean_13","ean_8"]}).detect(scanCanvas).then(function(codes){if(codes.length>0)onBarcodeDetected(codes[0].rawValue)}).catch(function(){});
  }
}
function onBarcodeDetected(isbn){
  if(scannedBookData)return;
  if(scannerInterval){clearInterval(scannerInterval);scannerInterval=null}
  document.getElementById("scannerLabel").textContent="Found "+isbn+" - Looking up...";
  fetchISBN(isbn);
}
function fetchISBN(isbn){
  isbn=isbn.replace(/[^0-9X]/gi,"");
  fetch("https://www.googleapis.com/books/v1/volumes?q=isbn:"+isbn).then(function(r){return r.json()}).then(function(data){
    if(!data.items||!data.items.length){document.getElementById("scannerLabel").textContent="Not found. Try again.";if(scannerStream)scannerInterval=setInterval(function(){scanFrame(document.getElementById("scannerVideo"))},300);return}
    var info=data.items[0].volumeInfo;
    scannedBookData={title:info.title||"",author:(info.authors&&info.authors[0])||"",pages:String(info.pageCount||""),year:info.publishedDate?info.publishedDate.substring(0,4):"",cover:((info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail))||"").replace("http://","https://"),genre:(info.categories&&info.categories[0])||""};
    var pc=document.getElementById("previewCover");
    if(scannedBookData.cover){pc.src=scannedBookData.cover;pc.style.display="block"}else{pc.style.display="none"}
    document.getElementById("previewTitle").textContent=scannedBookData.title;
    document.getElementById("previewAuthor").textContent=scannedBookData.author;
    document.getElementById("scannerLabel").textContent="";
    document.getElementById("bookPreview").classList.add("show");
  }).catch(function(){document.getElementById("scannerLabel").textContent="Lookup failed. Try again."});
}
function confirmScannedBook(){
  if(!scannedBookData)return;closeScanner();var b=scannedBookData;
  var dup=books.find(function(bk){return(bk.title||"").toLowerCase()===b.title.toLowerCase()});
  if(dup){alert(b.title+" is already in your library.");return}
  var sc=prompt("Status: 1=Unread, 2=Reading, 3=Read","1");
  var statMap={"1":"unread","2":"reading","3":"read"};
  var status=statMap[(sc||"1").trim()]||"unread";
  var oa=prompt("Do you own it? y/n","y");
  var owned=oa&&oa.toLowerCase().indexOf("y")>-1;
  api("POST","/api/books",{title:b.title,author:b.author,status:status,owned:owned,pages:b.pages,year:b.year,cover:b.cover,genre:b.genre,read_count:status==="read"?1:0,rating:0}).then(function(nb){
    if(b.cover)coverCache[nb.id]=b.cover;
    books.push(nb);renderStats();renderGrid();populateBookSelect();openModal(books.length-1,true);
  }).catch(function(e){alert("Failed: "+e.message)});
}
function addByISBN(){
  closeAddMethod();var isbn=prompt("Enter ISBN:");if(!isbn)return;
  document.getElementById("scannerOverlay").classList.add("open");
  document.getElementById("scannerLabel").textContent="Looking up...";
  document.getElementById("bookPreview").classList.remove("show");
  fetchISBN(isbn);
}

// JOURNAL
function populateBookSelect(){
  var sel=document.getElementById("composerBook");sel.innerHTML="<option value=''>— none —</option>";
  books.filter(function(b){return b.status==="reading"||b.status==="read"}).sort(function(a,b){return(a.title||"").localeCompare(b.title||"")}).forEach(function(b){
    var o=document.createElement("option");o.value=b.id;o.textContent=b.title+(b.author?" — "+b.author:"");sel.appendChild(o);
  });
}
document.getElementById("composerText").addEventListener("input",function(){document.getElementById("composerChar").textContent=this.value.length+" chars"});
function clearComposer(){document.getElementById("composerText").value="";document.getElementById("composerBook").value="";document.getElementById("composerChar").textContent="0 chars"}
function submitEntry(){
  var content=document.getElementById("composerText").value.trim();if(!content)return;
  var bookId=document.getElementById("composerBook").value;
  var bookTitle="";if(bookId){var f=books.find(function(b){return String(b.id)===bookId});if(f)bookTitle=f.title}
  api("POST","/api/journal",{content:content,book_id:bookId||null,book_title:bookTitle}).then(function(e){journalEntries.unshift(e);clearComposer();renderJournal()}).catch(function(e){alert("Failed: "+e.message)});
}
function renderJournal(){
  document.getElementById("journalCount").textContent=journalEntries.length+" "+(journalEntries.length===1?"entry":"entries");
  var feed=document.getElementById("journalFeed");
  if(!journalEntries.length){feed.innerHTML="<div class='empty'>Your journal is empty.</div>";return}
  var groups={};
  journalEntries.forEach(function(e){var k=fmtDate(e.created_at);if(!groups[k])groups[k]=[];groups[k].push(e)});
  var html="";
  Object.keys(groups).forEach(function(date){
    html+="<div class='j-day-label'>"+date+"</div>";
    groups[date].forEach(function(e){
      html+="<div class='j-entry' id='je-"+e.id+"'><div class='j-meta'><span class='j-date'>"+fmtTime(e.created_at)+"</span>"+(e.book_title?"<span class='j-book'>"+esc(e.book_title)+"</span>":"")+"<div class='j-actions'><button class='j-act' onclick='editJEntry("+e.id+")'>Edit</button><button class='j-act del' onclick='deleteJEntry("+e.id+")'>Delete</button></div></div><div class='j-content' id='jc-"+e.id+"'>"+esc(e.content)+"</div><textarea class='j-edit' id='je-edit-"+e.id+"' rows='4'>"+esc(e.content)+"</textarea><div class='j-edit-footer' id='je-footer-"+e.id+"'><button class='btn btn-ghost' onclick='cancelJEdit("+e.id+")'>Cancel</button><button class='btn btn-primary' onclick='saveJEntry("+e.id+")'>Save</button></div></div>";
    });
  });
  feed.innerHTML=html;
}
function editJEntry(id){document.getElementById("jc-"+id).style.display="none";document.getElementById("je-edit-"+id).style.display="block";document.getElementById("je-footer-"+id).style.display="flex";document.getElementById("je-edit-"+id).focus()}
function cancelJEdit(id){document.getElementById("jc-"+id).style.display="block";document.getElementById("je-edit-"+id).style.display="none";document.getElementById("je-footer-"+id).style.display="none"}
function saveJEntry(id){
  var c=document.getElementById("je-edit-"+id).value.trim();if(!c)return;
  api("PATCH","/api/journal/"+id,{content:c}).then(function(u){var i=journalEntries.findIndex(function(e){return e.id===id});if(i>-1)journalEntries[i]=u;renderJournal()}).catch(function(e){alert(e.message)});
}
function deleteJEntry(id){
  if(!confirm("Delete this entry?"))return;
  api("DELETE","/api/journal/"+id).then(function(){journalEntries=journalEntries.filter(function(e){return e.id!==id});renderJournal()}).catch(function(e){alert(e.message)});
}

// EXPORT
function exportData(){
  var blob=new Blob([JSON.stringify({books:books,journal:journalEntries},null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="arcave_backup.json";a.click();
}

// EVENTS
document.getElementById("posterGrid").addEventListener("click",function(e){
  var pstar=e.target.closest&&e.target.closest(".pstar");
  if(pstar){
    e.stopPropagation();
    var wrap=pstar.closest(".poster-stars");
    var idx=parseInt(wrap.getAttribute("data-i"));
    var v=parseInt(pstar.getAttribute("data-v"));
    books[idx].rating=books[idx].rating===v?0:v;
    wrap.querySelectorAll(".pstar").forEach(function(s,i){s.classList.toggle("filled",i<books[idx].rating)});
    api("PATCH","/api/books/"+books[idx].id,{rating:books[idx].rating}).catch(function(){});
    return;
  }
  var card=e.target.closest&&e.target.closest(".poster-card");
  if(card)openModal(parseInt(card.getAttribute("data-i")));
});
document.querySelectorAll(".filter-btn").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");currentFilter=btn.getAttribute("data-filter");renderGrid();
  });
});
document.getElementById("searchInput").addEventListener("input",function(){currentSearch=this.value.trim();renderGrid()});
document.getElementById("sortSelect").addEventListener("change",function(){currentSort=this.value;renderGrid()});
document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal()});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});
document.getElementById("loginPass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
document.getElementById("signupEmail").addEventListener("keydown",function(e){if(e.key==="Enter")doSignup()});

// INIT
if(token){
  api("GET","/api/auth/me").then(function(d){
    currentUser=d.username;
    document.getElementById("navUsername").textContent=currentUser;
    document.getElementById("authScreen").classList.remove("active");
    document.getElementById("appScreen").style.display="block";
    loadAll();
  }).catch(function(){logout()});
}
</script>
