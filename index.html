<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arcave · library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0d12;
  --paper: #f5f2eb;
  --parchment: #ede9df;
  --ash: #c4bfb3;
  --smoke: #7a7570;
  --read: #2a6b4a;
  --reading: #7a5c1e;
  --unread: #3a3a5a;
  --accent: #c4783a;
  --spine-w: 140px;
  --spine-h: 210px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--ink);
  color: var(--paper);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 16px;
  min-height: 100vh;
}
/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,13,18,0.95);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid #2a2a38;
  padding: 0 24px;
  display: flex; align-items: center; gap: 20px; height: 56px;
}
.nav-brand {
  font-family: 'Space Mono', monospace;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--accent);
}
.nav-brand span { color: var(--ash); font-weight: 400; }
.search-wrap {
  flex: 1; max-width: 420px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: #1a1a25; border: 1px solid #2a2a38; border-radius: 4px;
  color: var(--paper); font-family: 'Space Mono', monospace; font-size: 12px;
  padding: 8px 12px 8px 36px; outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--smoke); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--smoke); font-size: 14px; pointer-events: none;
}
.nav-filters {
  display: flex; gap: 4px; margin-left: auto;
}
.filter-btn {
  background: none; border: 1px solid #2a2a38; border-radius: 3px;
  color: var(--ash); font-family: 'Space Mono', monospace; font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 10px; cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--ash); color: var(--paper); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
/* STATS BAR */
.stats-bar {
  background: #12121a;
  border-bottom: 1px solid #1e1e2a;
  padding: 12px 24px;
  display: flex; gap: 32px; align-items: center;
  font-family: 'Space Mono', monospace; font-size: 11px;
}
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-n { font-size: 22px; font-weight: 700; color: var(--paper); line-height: 1; }
.stat-l { color: var(--smoke); text-transform: uppercase; letter-spacing: 0.08em; }
.stat-n.s-read { color: #4caf82; }
.stat-n.s-reading { color: #d4a459; }
.stat-n.s-unread { color: #7c8fd0; }
.stats-divider { width: 1px; height: 36px; background: #2a2a38; }
.sort-wrap {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  font-family: 'Space Mono', monospace; font-size: 10px; color: var(--smoke);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.sort-wrap select {
  background: #1a1a25; border: 1px solid #2a2a38; border-radius: 3px;
  color: var(--paper); font-family: 'Space Mono', monospace; font-size: 10px;
  padding: 4px 8px; outline: none; cursor: pointer;
}
/* MAIN GRID */
main { padding: 28px 24px 60px; }
.result-info {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--smoke); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, var(--spine-w));
  gap: 20px 14px;
}
/* BOOK CARD */
.book-card {
  width: var(--spine-w);
  cursor: pointer;
  position: relative;
}
.cover-wrap {
  width: var(--spine-w);
  height: var(--spine-h);
  position: relative;
  border-radius: 3px 6px 6px 3px;
  overflow: hidden;
  box-shadow: -2px 2px 0 #000, 3px 6px 18px rgba(0,0,0,0.6);
  transition: transform 0.2s, box-shadow 0.2s;
}
.book-card:hover .cover-wrap {
  transform: translateY(-4px) rotate(-1deg);
  box-shadow: -2px 2px 0 #000, 6px 14px 28px rgba(0,0,0,0.7);
}
.cover-img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.cover-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px;
  text-align: center;
  position: relative;
}
.cover-placeholder .ph-title {
  font-family: 'EB Garamond', serif; font-style: italic;
  font-size: 13px; line-height: 1.35;
  color: rgba(255,255,255,0.9);
  margin-bottom: 8px;
  z-index: 1;
}
.cover-placeholder .ph-author {
  font-family: 'Space Mono', monospace; font-size: 8px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase; letter-spacing: 0.06em;
  z-index: 1;
}
/* spine line */
.cover-wrap::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 6px;
  background: rgba(0,0,0,0.35);
  z-index: 2;
}
/* status badge */
.status-badge {
  position: absolute; top: 6px; right: 6px; z-index: 3;
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.4);
}
.status-badge.read { background: #4caf82; }
.status-badge.reading { background: #d4a459; }
.status-badge.unread { background: rgba(255,255,255,0.2); }
/* reread badge */
.reread-badge {
  position: absolute; top: 6px; left: 12px; z-index: 3;
  background: var(--accent); color: #fff;
  font-family: 'Space Mono', monospace; font-size: 7px;
  padding: 2px 4px; border-radius: 2px;
}
/* rating stars */
.rating-wrap {
  position: absolute; bottom: 6px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 2px; z-index: 3;
}
.star {
  font-size: 9px; cursor: pointer;
  color: rgba(255,255,255,0.2);
  transition: color 0.1s;
  line-height: 1;
}
.star.filled { color: #f0c040; }
.star:hover, .star:hover ~ .star { color: rgba(255,255,255,0.2); }
.rating-wrap:hover .star { color: #f0c040; }
.rating-wrap .star:hover ~ .star { color: rgba(255,255,255,0.2) !important; }
/* book meta below card */
.book-meta {
  padding: 8px 2px 0;
}
.book-title-sm {
  font-family: 'EB Garamond', serif; font-style: italic;
  font-size: 12px; line-height: 1.3;
  color: var(--ash);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #16161f;
  border: 1px solid #2a2a38;
  border-radius: 8px;
  max-width: 700px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column;
}
.modal-header {
  display: flex; gap: 24px; padding: 28px;
  border-bottom: 1px solid #1e1e2a;
}
.modal-cover {
  width: 100px; height: 150px; flex-shrink: 0;
  border-radius: 2px 5px 5px 2px;
  object-fit: cover;
  box-shadow: -2px 2px 0 #000, 3px 6px 12px rgba(0,0,0,0.5);
}
.modal-cover-ph {
  width: 100px; height: 150px; flex-shrink: 0;
  border-radius: 2px 5px 5px 2px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'EB Garamond', serif; font-style: italic;
  font-size: 11px; color: rgba(255,255,255,0.7);
  text-align: center; padding: 8px;
  box-shadow: -2px 2px 0 #000, 3px 6px 12px rgba(0,0,0,0.5);
}
.modal-title-block { flex: 1; min-width: 0; }
.modal-title {
  font-size: 26px; font-style: italic; line-height: 1.2;
  margin-bottom: 6px; color: var(--paper);
}
.modal-author {
  font-family: 'Space Mono', monospace; font-size: 11px;
  color: var(--smoke); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 16px;
}
.modal-status-row {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.status-pill {
  font-family: 'Space Mono', monospace; font-size: 10px;
  padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
  letter-spacing: 0.06em; font-weight: 700; cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.status-pill.read { background: rgba(74,176,120,0.15); color: #4caf82; border-color: rgba(74,176,120,0.3); }
.status-pill.reading { background: rgba(212,164,89,0.15); color: #d4a459; border-color: rgba(212,164,89,0.3); }
.status-pill.unread { background: rgba(124,143,208,0.1); color: #7c8fd0; border-color: rgba(124,143,208,0.2); }
.status-pill:hover { opacity: 0.75; }
.reread-count {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--accent); background: rgba(196,120,58,0.1);
  border: 1px solid rgba(196,120,58,0.25);
  border-radius: 20px; padding: 4px 10px;
}
.modal-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
.field-group label {
  display: block;
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--smoke); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.field-group textarea, .field-group input[type=text] {
  width: 100%;
  background: #1a1a25; border: 1px solid #2a2a38; border-radius: 4px;
  color: var(--paper); font-family: 'EB Garamond', serif; font-size: 15px;
  padding: 10px 12px; outline: none; resize: vertical;
  transition: border-color 0.2s; line-height: 1.5;
}
.field-group textarea:focus, .field-group input[type=text]:focus {
  border-color: var(--accent);
}
.dates-row { display: flex; gap: 16px; }
.dates-row .field-group { flex: 1; }
.modal-stars { display: flex; gap: 4px; }
.modal-star {
  font-size: 22px; cursor: pointer;
  color: rgba(255,255,255,0.15);
  transition: color 0.1s;
}
.modal-star.filled { color: #f0c040; }
.modal-footer {
  padding: 16px 28px;
  border-top: 1px solid #1e1e2a;
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn {
  font-family: 'Space Mono', monospace; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.07em;
  padding: 9px 18px; border-radius: 4px; cursor: pointer;
  border: 1px solid; transition: all 0.15s;
}
.btn-ghost {
  background: none; border-color: #2a2a38; color: var(--ash);
}
.btn-ghost:hover { border-color: var(--ash); color: var(--paper); }
.btn-primary {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.btn-primary:hover { opacity: 0.85; }
.btn-reread {
  background: none; border-color: rgba(196,120,58,0.4); color: var(--accent);
}
.btn-reread:hover { background: rgba(196,120,58,0.1); }
.btn-danger {
  background: none; border-color: rgba(200,60,60,0.3); color: #c84444;
  margin-right: auto;
}
.btn-danger:hover { background: rgba(200,60,60,0.1); }
/* ADD BOOK */
.add-btn-wrap {
  position: fixed; bottom: 28px; right: 28px; z-index: 150;
}
.add-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  color: #fff; font-size: 24px;
  box-shadow: 0 4px 18px rgba(196,120,58,0.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.add-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(196,120,58,0.5); }
/* COVER PALETTE - procedural colors based on title hash */
.ph-0 { background: linear-gradient(145deg, #1a2a4a, #2d1a4a); }
.ph-1 { background: linear-gradient(145deg, #2a1a1a, #4a1a2a); }
.ph-2 { background: linear-gradient(145deg, #1a2a1a, #1a3a2a); }
.ph-3 { background: linear-gradient(145deg, #2a2a1a, #3a2a0a); }
.ph-4 { background: linear-gradient(145deg, #1a1a3a, #0a1a4a); }
.ph-5 { background: linear-gradient(145deg, #2a1a2a, #1a0a3a); }
.ph-6 { background: linear-gradient(145deg, #1a3030, #0a2030); }
.ph-7 { background: linear-gradient(145deg, #302010, #201000); }
.ph-8 { background: linear-gradient(145deg, #201a30, #100a28); }
.ph-9 { background: linear-gradient(145deg, #0a2020, #0a3030); }
/* EMPTY STATE */
.empty {
  grid-column: 1/-1;
  padding: 80px 0;
  text-align: center;
  color: var(--smoke);
  font-style: italic;
  font-size: 18px;
}
/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }
</style>
</head>

</div>

  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}

    const saved = localStorage.getItem('arcave_library');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(SEED));
}
function saveBooks() {
  try { localStorage.setItem('arcave_library', JSON.stringify(books)); } catch(e) {}
}

let books = loadBooks();
let currentFilter = 'all';
let currentSearch = '';
let currentSort = 'author';
let openIdx = null;

// ── RENDER ──────────────────────────────────────
function getFiltered() {
  let list = books.map((b, i) => ({...b, _i: i}));
  if (currentFilter !== 'all') list = list.filter(b => b.status === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(b =>
      b.title.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q) ||
      b.genre.toLowerCase().includes(q)
    );
  }
  list.sort((a, b) => {
    if (currentSort === 'author') return a.author.localeCompare(b.author);
    if (currentSort === 'title') return a.title.localeCompare(b.title);
    if (currentSort === 'rating') return b.rating - a.rating;
    if (currentSort === 'finish') return (b.finish || '').localeCompare(a.finish || '');
    if (currentSort === 'status') {
      const o = {read:0, reading:1, unread:2};
      return (o[a.status]||2) - (o[b.status]||2);
    }
    return 0;
  });
  return list;
}

function renderStats() {
  document.getElementById('statTotal').textContent = books.length;
  document.getElementById('statRead').textContent = books.filter(b=>b.status==='read').length;
  document.getElementById('statReading').textContent = books.filter(b=>b.status==='reading').length;
  document.getElementById('statUnread').textContent = books.filter(b=>b.status==='unread').length;
}

function starHtml(n, prefix='s') {
  return [1,2,3,4,5].map(i =>
    `<span class="star ${i<=n?'filled':''}" data-v="${i}" data-p="${prefix}">${i<=n?'★':'☆'}</span>`
  ).join('');
}

function renderGrid() {
  const list = getFiltered();
  document.getElementById('resultInfo').textContent =
    `${list.length} book${list.length!==1?'s':''} shown`;
  const grid = document.getElementById('shelfGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">No books match your search.</div>';
    return;
  }
  grid.innerHTML = list.map(b => {
    const ph = hashColor(b.title + b.author);
    const coverHtml = b.cover
      ? `<img class="cover-img" src="${escHtml(b.cover)}" alt="${escHtml(b.title)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      : '';
    const phStyle = b.cover ? 'style="display:none"' : '';
    const badge = b.readCount > 1 ? `<div class="reread-badge">×${b.readCount}</div>` : '';
    return `<div class="book-card" data-i="${b._i}">
  <div class="cover-wrap" style="cursor:pointer">
    ${coverHtml}
    <div class="cover-placeholder ${ph}" ${phStyle}>
      <div class="ph-title">${escHtml(b.title)}</div>
      <div class="ph-author">${escHtml(b.author)}</div>
    </div>
    <div class="status-badge ${b.status}"></div>
    ${badge}
    <div class="rating-wrap" data-i="${b._i}" onclick="event.stopPropagation()">
      ${starHtml(b.rating,'g')}
    </div>
  </div>
  <div class="book-meta">
    <div class="book-title-sm">${escHtml(b.title)}</div>
  </div>
</div>`;
  }).join('');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── MODAL ────────────────────────────────────────
function openModal(idx, isNew = false) {
  openIdx = idx;
  const b = books[idx];
  const ph = hashColor(b.title + b.author);
  const coverEl = b.cover
    ? `<img class="modal-cover" src="${escHtml(b.cover)}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
    : '';
  const phd = b.cover ? 'style="display:none"' : '';

  document.getElementById('modalHeader').innerHTML = `
    ${coverEl}
    <div class="modal-cover-ph ${ph}" ${phd}>${escHtml(b.title)}</div>
    <div class="modal-title-block">
      <div class="modal-title">${escHtml(b.title)}</div>
      <div class="modal-author">${escHtml(b.author)}</div>
      <div class="modal-status-row">
        <span class="status-pill ${b.status}" data-st="${b.status}" onclick="cycleStatus()">${b.status}</span>
        ${b.readCount>1 ? `<span class="reread-count">Read ×${b.readCount}</span>` : ''}
      </div>
      <div style="margin-top:12px">
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Rating</div>
        <div class="modal-stars" id="modalStars">
          ${[1,2,3,4,5].map(i=>`<span class="modal-star ${i<=b.rating?'filled':''}" data-v="${i}">★</span>`).join('')}
        </div>
      </div>
    </div>`;

  document.getElementById('modalBody').innerHTML = `
    <div class="field-group">
      <label>Cover URL (paste image link)</label>
      <input type="text" id="mCover" value="${escHtml(b.cover)}" placeholder="https://…">
    </div>
    <div class="field-group">
      <label>Genre / Tags</label>
      <input type="text" id="mGenre" value="${escHtml(b.genre)}" placeholder="Fiction, Contemporary…">
    </div>
    <div class="dates-row">
      <div class="field-group">
        <label>Started</label>
        <input type="text" id="mStart" value="${escHtml(b.start)}" placeholder="DD.MM.YYYY">
      </div>
      <div class="field-group">
        <label>Finished</label>
        <input type="text" id="mFinish" value="${escHtml(b.finish)}" placeholder="DD.MM.YYYY">
      </div>
    </div>
    <div class="field-group">
      <label>Notes while reading</label>
      <textarea id="mNotesR" rows="3" placeholder="How you felt as you read…">${escHtml(b.notesReading)}</textarea>
    </div>
    <div class="field-group">
      <label>Notes after finishing</label>
      <textarea id="mNotesA" rows="3" placeholder="Thoughts once you finished…">${escHtml(b.notesAfter)}</textarea>
    </div>`;

  document.getElementById('modalFooter').innerHTML = `
    ${isNew ? '' : '<button class="btn btn-danger" onclick="deleteBook()">Delete</button>'}
    ${b.status==='read' ? '<button class="btn btn-reread" onclick="markReread()">Mark Reread</button>' : ''}
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveModal()">Save</button>`;

  // star click in modal
  document.getElementById('modalStars').addEventListener('click', e => {
    const v = parseInt(e.target.dataset.v);
    if (!v) return;
    books[openIdx].rating = v;
    document.querySelectorAll('.modal-star').forEach((s,i) => {
      s.classList.toggle('filled', i < v);
    });
  });

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  openIdx = null;
}

function cycleStatus() {
  if (openIdx === null) return;
  const order = ['unread','reading','read'];
  const cur = books[openIdx].status;
  books[openIdx].status = order[(order.indexOf(cur)+1)%3];
  const pill = document.querySelector('.status-pill');
  pill.textContent = books[openIdx].status;
  pill.className = 'status-pill ' + books[openIdx].status;
  pill.dataset.st = books[openIdx].status;
}

function saveModal() {
  if (openIdx === null) return;
  const b = books[openIdx];
  b.cover = document.getElementById('mCover').value.trim();
  b.genre = document.getElementById('mGenre').value.trim();
  b.start = document.getElementById('mStart').value.trim();
  b.finish = document.getElementById('mFinish').value.trim();
  b.notesReading = document.getElementById('mNotesR').value.trim();
  b.notesAfter = document.getElementById('mNotesA').value.trim();
  // update status from finish date
  if (b.finish && b.status === 'reading') b.status = 'read';
  saveBooks();
  renderStats();
  renderGrid();
  closeModal();
}

function markReread() {
  if (openIdx === null) return;
  books[openIdx].readCount = (books[openIdx].readCount || 1) + 1;
  saveBooks();
  renderStats();
  renderGrid();
  closeModal();
}

function deleteBook() {
  if (openIdx === null) return;
  if (!confirm('Remove this book from your library?')) return;
  books.splice(openIdx, 1);
  saveBooks();
  renderStats();
  renderGrid();
  closeModal();
}

function openAddModal() {
  // check duplicate before adding
  const title = prompt('Book title:');
  if (!title) return;
  const dup = books.find(b => b.title.toLowerCase() === title.toLowerCase());
  if (dup) {
    alert(`"${dup.title}" is already in your library.
You can open it and click "Mark Reread" if you've read it again.`);
    return;
  }
  const author = prompt('Author:');
  if (!author) return;
  const newBook = {
    author: author.trim(),
    title: title.trim(),
    start: '', finish: '',
    notesReading: '', notesAfter: '',
    status: 'unread',
    readCount: 0, rating: 0,
    cover: '', genre: ''
  };
  books.push(newBook);
  saveBooks();
  renderStats();
  renderGrid();
  openModal(books.length - 1, true);
}

// ── EVENTS ───────────────────────────────────────
document.getElementById('shelfGrid').addEventListener('click', e => {
  // star in grid
  const star = e.target.closest('.star');
  if (star) {
    e.stopPropagation();
    const wrap = star.closest('.rating-wrap');
    const idx = parseInt(wrap.dataset.i);
    const v = parseInt(star.dataset.v);
    books[idx].rating = v;
    saveBooks();
    wrap.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('filled', i < v));
    return;
  }
  // card click
  const card = e.target.closest('.book-card');
  if (card) openModal(parseInt(card.dataset.i));
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  renderGrid();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  renderGrid();
});

document.getElementById('addBtn').addEventListener('click', openAddModal);

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── INIT ─────────────────────────────────────────
renderStats();
renderGrid();
</script>
</body>
</html>
