<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arcave · library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d12;--paper:#f5f2eb;--ash:#c4bfb3;--smoke:#7a7570;--accent:#c4783a;--spine-w:140px;--spine-h:210px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:'EB Garamond',Georgia,serif;font-size:16px;min-height:100vh}

/* ── AUTH ── */
.auth-screen{display:none;position:fixed;inset:0;z-index:500;background:var(--ink);align-items:center;justify-content:center;padding:20px}
.auth-screen.active{display:flex}
.auth-box{width:100%;max-width:380px}
.auth-logo{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;letter-spacing:.12em;color:var(--accent);margin-bottom:4px}
.auth-logo span{color:var(--ash);font-weight:400}
.auth-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;margin-bottom:36px}
.auth-tabs{display:flex;border-bottom:1px solid #2a2a38;margin-bottom:24px}
.auth-tab{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:8px 20px;cursor:pointer;color:var(--smoke);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-field label{display:block;font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.auth-field input{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:'Space Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s}
.auth-field input:focus{border-color:var(--accent)}
.auth-field input::placeholder{color:#3a3a4a}
.auth-btn{background:var(--accent);border:none;border-radius:4px;color:#fff;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:12px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.auth-btn:hover{opacity:.85}
.auth-error{font-family:'Space Mono',monospace;font-size:10px;color:#e06b6b;background:rgba(224,107,107,.08);border:1px solid rgba(224,107,107,.2);border-radius:3px;padding:8px 12px;display:none}
.auth-error.show{display:block}
.auth-note{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-align:center;margin-top:8px}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(13,13,18,.97);backdrop-filter:blur(8px);border-bottom:1px solid #2a2a38;padding:0 20px;display:flex;align-items:center;gap:14px;height:56px}
.nav-brand{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);white-space:nowrap;cursor:pointer}
.nav-brand span{color:var(--ash);font-weight:400}
.search-wrap{flex:1;max-width:360px;position:relative;min-width:80px}
.search-wrap input{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:'Space Mono',monospace;font-size:12px;padding:8px 12px 8px 32px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--smoke)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--smoke);font-size:14px;pointer-events:none}
.nav-filters{display:flex;gap:3px}
.filter-btn{background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:5px 8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--ash);color:var(--paper)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-journal-btn{font-family:'Space Mono',monospace;font-size:10px;background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);padding:5px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;white-space:nowrap}
.nav-journal-btn:hover,.nav-journal-btn.active{background:rgba(196,120,58,.1);border-color:var(--accent);color:var(--accent)}
.nav-username{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.06em}
.nav-logout{font-family:'Space Mono',monospace;font-size:9px;color:#4a4a5a;background:none;border:1px solid #2a2a38;border-radius:3px;padding:4px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.nav-logout:hover{border-color:var(--smoke);color:var(--ash)}

/* ── STATS BAR ── */
.stats-bar{background:#12121a;border-bottom:1px solid #1e1e2a;padding:10px 20px;display:flex;gap:18px;align-items:center;font-family:'Space Mono',monospace;overflow-x:auto}
.stat{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.stat-n{font-size:20px;font-weight:700;line-height:1}
.stat-l{color:var(--smoke);text-transform:uppercase;letter-spacing:.07em;font-size:9px}
.s-read{color:#4caf82}.s-reading{color:#d4a459}.s-owned{color:#9b7ec8}.s-want{color:#5b9bd5}.s-buy{color:#e06b8b}
.stats-div{width:1px;height:30px;background:#2a2a38;flex-shrink:0}
.sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0}
.sort-wrap select{background:#1a1a25;border:1px solid #2a2a38;border-radius:3px;color:var(--paper);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;outline:none;cursor:pointer}

/* ── LIBRARY VIEW ── */
#libraryView{display:block}
main{padding:22px 20px 80px}
.result-info{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.shelf-grid{display:grid;grid-template-columns:repeat(auto-fill,var(--spine-w));gap:18px 12px}
.book-card{width:var(--spine-w);cursor:pointer}
.cover-wrap{width:var(--spine-w);height:var(--spine-h);position:relative;border-radius:3px 6px 6px 3px;overflow:hidden;box-shadow:-2px 2px 0 #000,3px 6px 18px rgba(0,0,0,.6);transition:transform .2s,box-shadow .2s}
.book-card:hover .cover-wrap{transform:translateY(-4px) rotate(-1deg);box-shadow:-2px 2px 0 #000,6px 14px 28px rgba(0,0,0,.7)}
.cover-img{width:100%;height:100%;object-fit:cover;display:block}
.cover-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center}
.ph-title{font-family:'EB Garamond',serif;font-style:italic;font-size:13px;line-height:1.35;color:rgba(255,255,255,.9);margin-bottom:6px}
.ph-author{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}
.cover-wrap::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:rgba(0,0,0,.35);z-index:2}
.status-dot{position:absolute;top:6px;right:6px;z-index:3;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,.4)}
.status-dot.read{background:#4caf82}.status-dot.reading{background:#d4a459}
.status-dot.owned-unread{background:#9b7ec8}.status-dot.want-to-read{background:#5b9bd5}
.status-dot.want-to-buy{background:#e06b8b}.status-dot.unread{background:rgba(255,255,255,.15)}
.reread-badge{position:absolute;top:6px;left:12px;z-index:3;background:var(--accent);color:#fff;font-family:'Space Mono',monospace;font-size:7px;padding:2px 4px;border-radius:2px}
.rating-wrap{position:absolute;bottom:5px;left:0;right:0;display:flex;justify-content:center;gap:2px;z-index:3}
.star{font-size:9px;cursor:pointer;color:rgba(255,255,255,.15);line-height:1}
.star.filled{color:#f0c040}
.rating-wrap:hover .star{color:#f0c040}
.rating-wrap .star:hover~.star{color:rgba(255,255,255,.15)!important}
.book-meta{padding:7px 2px 0}
.book-title-sm{font-family:'EB Garamond',serif;font-style:italic;font-size:12px;line-height:1.3;color:var(--ash);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-author-sm{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* PALETTES */
.ph-0{background:linear-gradient(145deg,#1a2a4a,#2d1a4a)}.ph-1{background:linear-gradient(145deg,#2a1a1a,#4a1a2a)}
.ph-2{background:linear-gradient(145deg,#1a2a1a,#1a3a2a)}.ph-3{background:linear-gradient(145deg,#2a2a1a,#3a2a0a)}
.ph-4{background:linear-gradient(145deg,#1a1a3a,#0a1a4a)}.ph-5{background:linear-gradient(145deg,#2a1a2a,#1a0a3a)}
.ph-6{background:linear-gradient(145deg,#1a3030,#0a2030)}.ph-7{background:linear-gradient(145deg,#302010,#201000)}
.ph-8{background:linear-gradient(145deg,#201a30,#100a28)}.ph-9{background:linear-gradient(145deg,#0a2020,#0a3030)}

/* ── JOURNAL VIEW ── */
#journalView{display:none;padding:0 0 80px}
.journal-header{padding:28px 24px 0;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid #1e1e2a;padding-bottom:20px;margin-bottom:0}
.journal-title{font-size:28px;font-style:italic;color:var(--paper)}
.journal-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em}

/* new entry composer */
.journal-composer{margin:24px 24px 0;background:#12121a;border:1px solid #2a2a38;border-radius:6px;overflow:hidden;transition:border-color .2s}
.journal-composer:focus-within{border-color:rgba(196,120,58,.4)}
.composer-book-tag{padding:10px 14px 0;display:flex;align-items:center;gap:8px}
.composer-book-tag select{background:#1a1a25;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;outline:none;max-width:260px;cursor:pointer}
.composer-book-tag label{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em}
.composer-textarea{width:100%;background:transparent;border:none;color:var(--paper);font-family:'EB Garamond',serif;font-size:17px;padding:14px 16px;outline:none;resize:none;line-height:1.65;min-height:120px}
.composer-textarea::placeholder{color:#2e2e3a}
.composer-footer{padding:8px 12px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #1e1e2a}
.composer-char{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);align-self:center;margin-right:auto}

/* entries feed */
.journal-feed{padding:24px 24px 0;display:flex;flex-direction:column;gap:20px}
.journal-entry{background:#12121a;border:1px solid #1e1e2a;border-radius:6px;overflow:hidden;transition:border-color .2s}
.journal-entry:hover{border-color:#2a2a38}
.entry-meta{padding:12px 16px 0;display:flex;align-items:center;gap:10px}
.entry-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.07em}
.entry-book-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--accent);background:rgba(196,120,58,.08);border:1px solid rgba(196,120,58,.15);border-radius:20px;padding:2px 8px}
.entry-actions{margin-left:auto;display:flex;gap:6px;opacity:0;transition:opacity .15s}
.journal-entry:hover .entry-actions{opacity:1}
.entry-act-btn{font-family:'Space Mono',monospace;font-size:9px;background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--smoke);padding:3px 7px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.entry-act-btn:hover{border-color:var(--ash);color:var(--ash)}
.entry-act-btn.del:hover{border-color:#c84444;color:#c84444}
.entry-content{padding:10px 16px 16px;font-size:16px;line-height:1.7;color:var(--paper);white-space:pre-wrap;word-break:break-word}
.entry-edit-area{width:100%;background:transparent;border:none;border-top:1px solid #1e1e2a;color:var(--paper);font-family:'EB Garamond',serif;font-size:16px;padding:12px 16px;outline:none;resize:none;line-height:1.7;display:none}
.entry-edit-footer{padding:8px 12px;border-top:1px solid #1e1e2a;display:none;justify-content:flex-end;gap:8px}
.journal-empty{padding:60px 24px;text-align:center;color:var(--smoke);font-style:italic;font-size:18px}

/* ── BOOK MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#16161f;border:1px solid #2a2a38;border-radius:8px;max-width:680px;width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{display:flex;gap:20px;padding:24px;border-bottom:1px solid #1e1e2a}
.modal-cover-el{width:90px;height:135px;flex-shrink:0;border-radius:2px 5px 5px 2px;object-fit:cover;box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5)}
.modal-cover-ph{width:90px;height:135px;flex-shrink:0;border-radius:2px 5px 5px 2px;display:flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;font-style:italic;font-size:10px;color:rgba(255,255,255,.7);text-align:center;padding:8px;box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5)}
.modal-title-block{flex:1;min-width:0}
.modal-title{font-size:22px;font-style:italic;line-height:1.2;margin-bottom:4px}
.modal-author{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.modal-meta-row{font-family:'Space Mono',monospace;font-size:9px;color:#4a4a5a;margin-bottom:12px}
.modal-status-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.status-pill{font-family:'Space Mono',monospace;font-size:9px;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.status-pill.read{background:rgba(74,176,120,.15);color:#4caf82;border-color:rgba(74,176,120,.3)}
.status-pill.reading{background:rgba(212,164,89,.15);color:#d4a459;border-color:rgba(212,164,89,.3)}
.status-pill.owned-unread{background:rgba(155,126,200,.12);color:#9b7ec8;border-color:rgba(155,126,200,.25)}
.status-pill.want-to-read{background:rgba(91,155,213,.12);color:#5b9bd5;border-color:rgba(91,155,213,.25)}
.status-pill.want-to-buy{background:rgba(224,107,139,.12);color:#e06b8b;border-color:rgba(224,107,139,.25)}
.status-pill:hover{opacity:.75}
.reread-count{font-family:'Space Mono',monospace;font-size:9px;color:var(--accent);background:rgba(196,120,58,.1);border:1px solid rgba(196,120,58,.25);border-radius:20px;padding:3px 9px}
.modal-stars-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.modal-stars{display:flex;gap:3px}
.modal-star{font-size:20px;cursor:pointer;color:rgba(255,255,255,.12)}
.modal-star.filled{color:#f0c040}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.field-group label{display:block;font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.field-group textarea,.field-group input[type=text]{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:'EB Garamond',serif;font-size:15px;padding:9px 11px;outline:none;resize:vertical;transition:border-color .2s;line-height:1.5}
.field-group textarea:focus,.field-group input[type=text]:focus{border-color:var(--accent)}
.gr-review-box{background:#0f1018;border:1px solid #1e1e2a;border-radius:4px;padding:10px 12px;font-family:'EB Garamond',serif;font-style:italic;font-size:14px;color:#7a7a9a;line-height:1.5}
.gr-label{font-family:'Space Mono',monospace;font-size:9px;color:#3a3a5a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.dates-row{display:flex;gap:12px}
.dates-row .field-group{flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid #1e1e2a;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:8px 16px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .15s}
.btn-ghost{background:none;border-color:#2a2a38;color:var(--ash)}
.btn-ghost:hover{border-color:var(--ash);color:var(--paper)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-reread{background:none;border-color:rgba(196,120,58,.4);color:var(--accent)}
.btn-reread:hover{background:rgba(196,120,58,.1)}
.btn-danger{background:none;border-color:rgba(200,60,60,.3);color:#c84444;margin-right:auto}
.btn-danger:hover{background:rgba(200,60,60,.1)}

/* ── FAB ── */
.fab-wrap{position:fixed;bottom:24px;right:24px;z-index:150;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:22px;box-shadow:0 4px 18px rgba(196,120,58,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fab:hover{transform:scale(1.08)}
.fab-sm{font-family:'Space Mono',monospace;font-size:9px;background:rgba(13,13,18,.9);border:1px solid #2a2a38;color:var(--smoke);padding:5px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.fab-sm:hover{border-color:var(--ash);color:var(--ash)}

.import-banner{background:rgba(196,120,58,.08);border:1px solid rgba(196,120,58,.2);border-radius:6px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;justify-content:space-between}
.import-banner p{font-family:'Space Mono',monospace;font-size:10px;color:var(--ash);line-height:1.5}
.import-banner-btns{display:flex;gap:8px;flex-shrink:0}
.empty,.loading{grid-column:1/-1;padding:60px 0;text-align:center;color:var(--smoke);font-style:italic;font-size:18px}
.loading{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-style:normal}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px}

@media(max-width:640px){
  :root{--spine-w:110px;--spine-h:165px}
  nav{gap:8px;padding:0 12px}
  .nav-filters{display:none}
  main,.journal-header,.journal-composer,.journal-feed{padding-left:14px;padding-right:14px}
  main{padding:14px 14px 80px}
}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen active" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">arcave <span>· library</span></div>
    <div class="auth-sub">your personal book shelf</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign in</div>
      <div class="auth-tab" onclick="switchTab('signup')">Create account</div>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-form" id="loginForm">
      <div class="auth-field"><label>Username</label><input type="text" id="loginUser" placeholder="your_username" autocomplete="username"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="auth-btn" onclick="doLogin()">Sign in</button>
    </div>
    <div class="auth-form" id="signupForm" style="display:none">
      <div class="auth-field"><label>Username</label><input type="text" id="signupUser" placeholder="letters, numbers, underscores" autocomplete="username"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="signupPass" placeholder="at least 6 characters" autocomplete="new-password"></div>
      <div class="auth-field"><label>Email <span style="color:#3a3a5a">(optional)</span></label><input type="text" id="signupEmail" placeholder="you@example.com"></div>
      <button class="auth-btn" onclick="doSignup()">Create account</button>
    </div>
    <div class="auth-note" id="authNote"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none">

<nav>
  <div class="nav-brand">arcave <span>· library</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search title, author…">
  </div>

<style>
:root{--ink:#0d0d12;--paper:#f5f2eb;--ash:#c4bfb3;--smoke:#7a7570;--accent:#c4783a;--spine-w:140px;--spine-h:210px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:'EB Garamond',Georgia,serif;font-size:16px;min-height:100vh}

/* ── AUTH ── */
.auth-screen{display:none;position:fixed;inset:0;z-index:500;background:var(--ink);align-items:center;justify-content:center;padding:20px}
.auth-screen.active{display:flex}
.auth-box{width:100%;max-width:380px}
.auth-logo{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;letter-spacing:.12em;color:var(--accent);margin-bottom:4px}
.auth-logo span{color:var(--ash);font-weight:400}
.auth-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;margin-bottom:36px}
.auth-tabs{display:flex;border-bottom:1px solid #2a2a38;margin-bottom:24px}
.auth-tab{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:8px 20px;cursor:pointer;color:var(--smoke);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-field label{display:block;font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.auth-field input{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:'Space Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s}
.auth-field input:focus{border-color:var(--accent)}
.auth-field input::placeholder{color:#3a3a4a}
.auth-btn{background:var(--accent);border:none;border-radius:4px;color:#fff;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:12px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.auth-btn:hover{opacity:.85}
.auth-error{font-family:'Space Mono',monospace;font-size:10px;color:#e06b6b;background:rgba(224,107,107,.08);border:1px solid rgba(224,107,107,.2);border-radius:3px;padding:8px 12px;display:none}
.auth-error.show{display:block}
.auth-note{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-align:center;margin-top:8px}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(13,13,18,.97);backdrop-filter:blur(8px);border-bottom:1px solid #2a2a38;padding:0 20px;display:flex;align-items:center;gap:14px;height:56px}
.nav-brand{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);white-space:nowrap;cursor:pointer}
.nav-brand span{color:var(--ash);font-weight:400}
.search-wrap{flex:1;max-width:360px;position:relative;min-width:80px}
.search-wrap input{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:'Space Mono',monospace;font-size:12px;padding:8px 12px 8px 32px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--smoke)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--smoke);font-size:14px;pointer-events:none}
.nav-filters{display:flex;gap:3px}
.filter-btn{background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:5px 8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--ash);color:var(--paper)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-journal-btn{font-family:'Space Mono',monospace;font-size:10px;background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);padding:5px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;white-space:nowrap}
.nav-journal-btn:hover,.nav-journal-btn.active{background:rgba(196,120,58,.1);border-color:var(--accent);color:var(--accent)}
.nav-username{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.06em}
.nav-logout{font-family:'Space Mono',monospace;font-size:9px;color:#4a4a5a;background:none;border:1px solid #2a2a38;border-radius:3px;padding:4px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.nav-logout:hover{border-color:var(--smoke);color:var(--ash)}

/* ── STATS BAR ── */
.stats-bar{background:#12121a;border-bottom:1px solid #1e1e2a;padding:10px 20px;display:flex;gap:18px;align-items:center;font-family:'Space Mono',monospace;overflow-x:auto}
.stat{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.stat-n{font-size:20px;font-weight:700;line-height:1}
.stat-l{color:var(--smoke);text-transform:uppercase;letter-spacing:.07em;font-size:9px}
.s-read{color:#4caf82}.s-reading{color:#d4a459}.s-owned{color:#9b7ec8}.s-want{color:#5b9bd5}.s-buy{color:#e06b8b}
.stats-div{width:1px;height:30px;background:#2a2a38;flex-shrink:0}
.sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0}
.sort-wrap select{background:#1a1a25;border:1px solid #2a2a38;border-radius:3px;color:var(--paper);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;outline:none;cursor:pointer}

/* ── LIBRARY VIEW ── */
#libraryView{display:block}
main{padding:22px 20px 80px}
.result-info{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.shelf-grid{display:grid;grid-template-columns:repeat(auto-fill,var(--spine-w));gap:18px 12px}
.book-card{width:var(--spine-w);cursor:pointer}
.cover-wrap{width:var(--spine-w);height:var(--spine-h);position:relative;border-radius:3px 6px 6px 3px;overflow:hidden;box-shadow:-2px 2px 0 #000,3px 6px 18px rgba(0,0,0,.6);transition:transform .2s,box-shadow .2s}
.book-card:hover .cover-wrap{transform:translateY(-4px) rotate(-1deg);box-shadow:-2px 2px 0 #000,6px 14px 28px rgba(0,0,0,.7)}
.cover-img{width:100%;height:100%;object-fit:cover;display:block}
.cover-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center}
.ph-title{font-family:'EB Garamond',serif;font-style:italic;font-size:13px;line-height:1.35;color:rgba(255,255,255,.9);margin-bottom:6px}
.ph-author{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}
.cover-wrap::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:rgba(0,0,0,.35);z-index:2}
.status-dot{position:absolute;top:6px;right:6px;z-index:3;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,.4)}
.status-dot.read{background:#4caf82}.status-dot.reading{background:#d4a459}
.status-dot.owned-unread{background:#9b7ec8}.status-dot.want-to-read{background:#5b9bd5}
.status-dot.want-to-buy{background:#e06b8b}.status-dot.unread{background:rgba(255,255,255,.15)}
.reread-badge{position:absolute;top:6px;left:12px;z-index:3;background:var(--accent);color:#fff;font-family:'Space Mono',monospace;font-size:7px;padding:2px 4px;border-radius:2px}
.rating-wrap{position:absolute;bottom:5px;left:0;right:0;display:flex;justify-content:center;gap:2px;z-index:3}
.star{font-size:9px;cursor:pointer;color:rgba(255,255,255,.15);line-height:1}
.star.filled{color:#f0c040}
.rating-wrap:hover .star{color:#f0c040}
.rating-wrap .star:hover~.star{color:rgba(255,255,255,.15)!important}
.book-meta{padding:7px 2px 0}
.book-title-sm{font-family:'EB Garamond',serif;font-style:italic;font-size:12px;line-height:1.3;color:var(--ash);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-author-sm{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* PALETTES */
.ph-0{background:linear-gradient(145deg,#1a2a4a,#2d1a4a)}.ph-1{background:linear-gradient(145deg,#2a1a1a,#4a1a2a)}
.ph-2{background:linear-gradient(145deg,#1a2a1a,#1a3a2a)}.ph-3{background:linear-gradient(145deg,#2a2a1a,#3a2a0a)}
.ph-4{background:linear-gradient(145deg,#1a1a3a,#0a1a4a)}.ph-5{background:linear-gradient(145deg,#2a1a2a,#1a0a3a)}
.ph-6{background:linear-gradient(145deg,#1a3030,#0a2030)}.ph-7{background:linear-gradient(145deg,#302010,#201000)}
.ph-8{background:linear-gradient(145deg,#201a30,#100a28)}.ph-9{background:linear-gradient(145deg,#0a2020,#0a3030)}

/* ── JOURNAL VIEW ── */
#journalView{display:none;padding:0 0 80px}
.journal-header{padding:28px 24px 0;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid #1e1e2a;padding-bottom:20px;margin-bottom:0}
.journal-title{font-size:28px;font-style:italic;color:var(--paper)}
.journal-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em}

/* new entry composer */
.journal-composer{margin:24px 24px 0;background:#12121a;border:1px solid #2a2a38;border-radius:6px;overflow:hidden;transition:border-color .2s}
.journal-composer:focus-within{border-color:rgba(196,120,58,.4)}
.composer-book-tag{padding:10px 14px 0;display:flex;align-items:center;gap:8px}
.composer-book-tag select{background:#1a1a25;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);font-family:'Space Mono',monospace;font-size:10px;padding:4px 8px;outline:none;max-width:260px;cursor:pointer}
.composer-book-tag label{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em}
.composer-textarea{width:100%;background:transparent;border:none;color:var(--paper);font-family:'EB Garamond',serif;font-size:17px;padding:14px 16px;outline:none;resize:none;line-height:1.65;min-height:120px}
.composer-textarea::placeholder{color:#2e2e3a}
.composer-footer{padding:8px 12px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #1e1e2a}
.composer-char{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);align-self:center;margin-right:auto}

/* entries feed */
.journal-feed{padding:24px 24px 0;display:flex;flex-direction:column;gap:20px}
.journal-entry{background:#12121a;border:1px solid #1e1e2a;border-radius:6px;overflow:hidden;transition:border-color .2s}
.journal-entry:hover{border-color:#2a2a38}
.entry-meta{padding:12px 16px 0;display:flex;align-items:center;gap:10px}
.entry-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.07em}
.entry-book-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--accent);background:rgba(196,120,58,.08);border:1px solid rgba(196,120,58,.15);border-radius:20px;padding:2px 8px}
.entry-actions{margin-left:auto;display:flex;gap:6px;opacity:0;transition:opacity .15s}
.journal-entry:hover .entry-actions{opacity:1}
.entry-act-btn{font-family:'Space Mono',monospace;font-size:9px;background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--smoke);padding:3px 7px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.entry-act-btn:hover{border-color:var(--ash);color:var(--ash)}
.entry-act-btn.del:hover{border-color:#c84444;color:#c84444}
.entry-content{padding:10px 16px 16px;font-size:16px;line-height:1.7;color:var(--paper);white-space:pre-wrap;word-break:break-word}
.entry-edit-area{width:100%;background:transparent;border:none;border-top:1px solid #1e1e2a;color:var(--paper);font-family:'EB Garamond',serif;font-size:16px;padding:12px 16px;outline:none;resize:none;line-height:1.7;display:none}
.entry-edit-footer{padding:8px 12px;border-top:1px solid #1e1e2a;display:none;justify-content:flex-end;gap:8px}
.journal-empty{padding:60px 24px;text-align:center;color:var(--smoke);font-style:italic;font-size:18px}

/* ── BOOK MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#16161f;border:1px solid #2a2a38;border-radius:8px;max-width:680px;width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{display:flex;gap:20px;padding:24px;border-bottom:1px solid #1e1e2a}
.modal-cover-el{width:90px;height:135px;flex-shrink:0;border-radius:2px 5px 5px 2px;object-fit:cover;box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5)}
.modal-cover-ph{width:90px;height:135px;flex-shrink:0;border-radius:2px 5px 5px 2px;display:flex;align-items:center;justify-content:center;font-family:'EB Garamond',serif;font-style:italic;font-size:10px;color:rgba(255,255,255,.7);text-align:center;padding:8px;box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5)}
.modal-title-block{flex:1;min-width:0}
.modal-title{font-size:22px;font-style:italic;line-height:1.2;margin-bottom:4px}
.modal-author{font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.modal-meta-row{font-family:'Space Mono',monospace;font-size:9px;color:#4a4a5a;margin-bottom:12px}
.modal-status-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.status-pill{font-family:'Space Mono',monospace;font-size:9px;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.status-pill.read{background:rgba(74,176,120,.15);color:#4caf82;border-color:rgba(74,176,120,.3)}
.status-pill.reading{background:rgba(212,164,89,.15);color:#d4a459;border-color:rgba(212,164,89,.3)}
.status-pill.owned-unread{background:rgba(155,126,200,.12);color:#9b7ec8;border-color:rgba(155,126,200,.25)}
.status-pill.want-to-read{background:rgba(91,155,213,.12);color:#5b9bd5;border-color:rgba(91,155,213,.25)}
.status-pill.want-to-buy{background:rgba(224,107,139,.12);color:#e06b8b;border-color:rgba(224,107,139,.25)}
.status-pill:hover{opacity:.75}
.reread-count{font-family:'Space Mono',monospace;font-size:9px;color:var(--accent);background:rgba(196,120,58,.1);border:1px solid rgba(196,120,58,.25);border-radius:20px;padding:3px 9px}
.modal-stars-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.modal-stars{display:flex;gap:3px}
.modal-star{font-size:20px;cursor:pointer;color:rgba(255,255,255,.12)}
.modal-star.filled{color:#f0c040}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.field-group label{display:block;font-family:'Space Mono',monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.field-group textarea,.field-group input[type=text]{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:'EB Garamond',serif;font-size:15px;padding:9px 11px;outline:none;resize:vertical;transition:border-color .2s;line-height:1.5}
.field-group textarea:focus,.field-group input[type=text]:focus{border-color:var(--accent)}
.gr-review-box{background:#0f1018;border:1px solid #1e1e2a;border-radius:4px;padding:10px 12px;font-family:'EB Garamond',serif;font-style:italic;font-size:14px;color:#7a7a9a;line-height:1.5}
.gr-label{font-family:'Space Mono',monospace;font-size:9px;color:#3a3a5a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.dates-row{display:flex;gap:12px}
.dates-row .field-group{flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid #1e1e2a;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:8px 16px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .15s}
.btn-ghost{background:none;border-color:#2a2a38;color:var(--ash)}
.btn-ghost:hover{border-color:var(--ash);color:var(--paper)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-reread{background:none;border-color:rgba(196,120,58,.4);color:var(--accent)}
.btn-reread:hover{background:rgba(196,120,58,.1)}
.btn-danger{background:none;border-color:rgba(200,60,60,.3);color:#c84444;margin-right:auto}
.btn-danger:hover{background:rgba(200,60,60,.1)}

/* ── FAB ── */
.fab-wrap{position:fixed;bottom:24px;right:24px;z-index:150;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:22px;box-shadow:0 4px 18px rgba(196,120,58,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fab:hover{transform:scale(1.08)}
.fab-sm{font-family:'Space Mono',monospace;font-size:9px;background:rgba(13,13,18,.9);border:1px solid #2a2a38;color:var(--smoke);padding:5px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.fab-sm:hover{border-color:var(--ash);color:var(--ash)}

.import-banner{background:rgba(196,120,58,.08);border:1px solid rgba(196,120,58,.2);border-radius:6px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;justify-content:space-between}
.import-banner p{font-family:'Space Mono',monospace;font-size:10px;color:var(--ash);line-height:1.5}
.import-banner-btns{display:flex;gap:8px;flex-shrink:0}
.empty,.loading{grid-column:1/-1;padding:60px 0;text-align:center;color:var(--smoke);font-style:italic;font-size:18px}
.loading{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-style:normal}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px}

@media(max-width:640px){
  :root{--spine-w:110px;--spine-h:165px}
  nav{gap:8px;padding:0 12px}
  .nav-filters{display:none}
  main,.journal-header,.journal-composer,.journal-feed{padding-left:14px;padding-right:14px}
  main{padding:14px 14px 80px}
}

<body>

<!-- AUTH -->
<div class="auth-screen active" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">arcave <span>· library</span></div>
    <div class="auth-sub">your personal book shelf</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign in</div>
      <div class="auth-tab" onclick="switchTab('signup')">Create account</div>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-form" id="loginForm">
      <div class="auth-field"><label>Username</label><input type="text" id="loginUser" placeholder="your_username" autocomplete="username"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="auth-btn" onclick="doLogin()">Sign in</button>
    </div>
    <div class="auth-form" id="signupForm" style="display:none">
      <div class="auth-field"><label>Username</label><input type="text" id="signupUser" placeholder="letters, numbers, underscores" autocomplete="username"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="signupPass" placeholder="at least 6 characters" autocomplete="new-password"></div>
      <div class="auth-field"><label>Email <span style="color:#3a3a5a">(optional)</span></label><input type="text" id="signupEmail" placeholder="you@example.com"></div>
      <button class="auth-btn" onclick="doSignup()">Create account</button>
    </div>
    <div class="auth-note" id="authNote"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none">

<nav>
  <div class="nav-brand">arcave <span>· library</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search title, author…">
  </div>
  <div class="nav-filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="read">Read</button>
    <button class="filter-btn" data-filter="reading">Reading</button>
    <button class="filter-btn" data-filter="owned-unread">Owned</button>
    <button class="filter-btn" data-filter="want-to-read">Want</button>
    <button class="filter-btn" data-filter="want-to-buy">Buy</button>
  </div>
  <div class="nav-right">
    <button class="nav-journal-btn" id="journalToggle" onclick="toggleJournal()">✦ Journal</button>
    <span class="nav-username" id="navUsername"></span>
    <button class="nav-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<!-- STATS (only in library view) -->
<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Total</div></div>
  <div class="stats-div"></div>
  <div class="stat"><div class="stat-n s-read" id="sRead">0</div><div class="stat-l">Read</div></div>
  <div class="stat"><div class="stat-n s-reading" id="sReading">0</div><div class="stat-l">Reading</div></div>
  <div class="stat"><div class="stat-n s-owned" id="sOwned">0</div><div class="stat-l">Owned</div></div>
  <div class="stat"><div class="stat-n s-want" id="sWant">0</div><div class="stat-l">Want</div></div>
  <div class="stat"><div class="stat-n s-buy" id="sBuy">0</div><div class="stat-l">Buy</div></div>
  <div class="stats-div"></div>
  <div class="stat"><div class="stat-n" id="sRated" style="color:#f0c040">0</div><div class="stat-l">Rated</div></div>
  <div class="stat"><div class="stat-n" id="sAvg" style="color:#f0c040">—</div><div class="stat-l">Avg ★</div></div>
  <div class="sort-wrap">Sort:
    <select id="sortSelect">
      <option value="author">Author A–Z</option>
      <option value="title">Title A–Z</option>
      <option value="status">Status</option>
      <option value="rating">Rating ↓</option>
      <option value="year">Year ↓</option>
      <option value="pages">Pages ↓</option>
    </select>
  </div>
</div>

<!-- LIBRARY VIEW -->
<div id="libraryView">
  <main>
    <div class="result-info" id="resultInfo"></div>
    <div id="importBanner" style="display:none" class="import-banner">
      <p>You have local data from the previous version.<br>Import it into your account?</p>
      <div class="import-banner-btns">
        <button class="btn btn-primary" onclick="importLocalData()">Import</button>
        <button class="btn btn-ghost" onclick="dismissImport()">Dismiss</button>
      </div>
    </div>
    <div class="shelf-grid" id="shelfGrid"></div>
  </main>
</div>

<!-- JOURNAL VIEW -->
<div id="journalView">
  <div class="journal-header">
    <div>
      <div class="journal-title">Reading Journal</div>
    </div>
    <div class="journal-count" id="journalCount"></div>
  </div>

  <!-- Composer -->
  <div class="journal-composer">
    <div class="composer-book-tag">
      <label>Tag a book</label>
      <select id="composerBook">
        <option value="">— no book —</option>
      </select>
    </div>
    <textarea class="composer-textarea" id="composerText" placeholder="Write anything. A thought mid-chapter, a quote that hit you, why you picked this book up today…" rows="4"></textarea>
    <div class="composer-footer">
      <span class="composer-char" id="composerChar">0 chars</span>
      <button class="btn btn-ghost" onclick="clearComposer()">Clear</button>
      <button class="btn btn-primary" onclick="submitEntry()">Save entry</button>
    </div>
  </div>

  <!-- Feed -->
  <div class="journal-feed" id="journalFeed"></div>
</div>

</div><!-- /appScreen -->

<!-- FAB -->
<div class="fab-wrap" id="fabWrap">
  <button class="fab-sm" onclick="exportData()">⬇ Export</button>
  <button class="fab" id="fabBtn" onclick="fabAction()" title="Add book">+</button>
</div>

<!-- BOOK MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

uthor":"Mieko Kawakami","title":"Heaven","status":"read","rating":4,"start":"9.12.2022","finish":"9.12.2022","pages":"167","year":"2021","notesDuring":"","notesAfter":"","grReview":"","cover":"","genre":"","readCount":1},{"author":"Mieko Kawakami","title":"Heaven","status":"read","rating":4,"start":"9.12.2022","finish":"9.12.2022","pages":"192","year":"2021","notesDuring":"","notesAfter":"","grReview":"Kojima, Ninomiya, Momose, Eyes- main charecter not his real name.<br/><br/>Eyes has been bullied through out his life, we as readers don't even know his actual name; which shows how demoralized  he feels. Through out the book he is being tortured by Ninomiya and some other while Momose is standing by watching. He is made to eat chalk, used as a human football, and stuck inside a locker. The thing is he is never beaten in a way that could alert a grown up and he is silent about it, except when he is made to be a football he goes to the hospital and is told to come back in a week to check up on the nose. <br/>The second time Eyes goes to the hospital, he sees Momose, and demends to talk to him. Eyes asks him doesn't he feel guilty that they beat him up, and he says no because Eyes could fight back. Which he has a point but at the same time it is bullshit. Momose also says that he is free to beat up Eyes and Eyes is free to not want that, they both have free will, which again is like what, but agreed.  The doctor asks Eyes about his eyes and if he had considered surgery which only costs 15,000 won. <br/>Kojima is a confusing character to me. The thing is she could avoid everything she is going through, but she refuses to shower and be clean; I understand that she feels being unclean and dirty will keep her connected to her father, but it's simple hygiene. I'm not saying what the classmates did to her was okay and justified, but I personally to feel if you can avoid being hurt, you do what you have to do. Also her father does not sound like a loving father to me, if you know your child can have it better then you do, you make them make use of the opportunities they have so they can live better. <br/>The difference between Eyes and Kojima  was that Eyes couldn't do anything about his eyes, he had done the surgery when he was a child they turned back to how they were. When Eyes tells Kojima about the eye surgery she stops talking to him and blames him for even thinking about getting rid of his sign which again is stupid, cause if he is able to see better and not be tormented why not try!<br/>Eyes keeps sending Kojima letters but she never answer, however near the end of the book she sends him a letter telling him to meet her in the park, and he is so excited that he runs over but is saddend to see that Ninomiya, Momose and the girls are there to make them have sex.  They force strip Eyes to his shorts and tell him to strip Kojima, but Eyes starts begging Ninomiya to let her go cause she didnt even wanna be there. Suddenly Kojima starts stripping and goes near the boys and girls who run away, leaving NInomiya and Momose there. Momose seems to be enjoying it in a twisted way, as soon as Ninomiya starts fighting back an old lady shouts at them and they run away leaving Kojima and Eyes standing there. Police comes and they are taken away, and that is the last time he ever sees Kojima. <br/>Eyes mom (who is her step mom and a really better parent then his father) listens to him to explain everything, and weather he wants to go to school or what he wants to do and if he wants to do the surgery.  He wants to do the surgery (which makes total sense). After the surgery he goes outside and opens his eye patch and starts crying for the beauty and being able to see the other side of the road he was walked by most of his life but at the same time for the fact that he has to live in such a world. <br/>I did enjoy this read, it was easy and beautifully written but I'm not sure that I grasped the meaning of it. 7/10","cover":"","genre":"","readCount" function hashColor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return PALETTE[Math.abs(h)%PALETTE.length]}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}
function fmtTime(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

let token=localStorage.getItem('arcave_token');
let currentUser=localStorage.getItem('arcave_user');
let books=[], journalEntries=[];
let currentFilter='all',currentSearch='',currentSort='author',openIdx=null;
let showingJournal=false;

// ── API ──
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token) opts.headers['Authorization']=`Bearer ${token}`;
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}

// ── AUTH ──
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('loginForm').style.display=tab==='login'?'flex':'none';
  document.getElementById('signupForm').style.display=tab==='signup'?'flex':'none';
  document.getElementById('authError').classList.remove('show');
}
function showAuthError(msg){const el=document.getElementById('authError');el.textContent=msg;el.classList.add('show')}
async function doLogin(){
  const username=document.getElementById('loginUser').value.trim();
  const password=document.getElementById('loginPass').value;
  if(!username||!password)return showAuthError('Fill in both fields');
  try{const d=await api('POST','/api/auth/login',{username,password});onLogin(d)}
  catch(e){showAuthError(e.message)}
}
async function doSignup(){
  const username=document.getElementById('signupUser').value.trim();
  const password=document.getElementById('signupPass').value;
  const email=document.getElementById('signupEmail').value.trim();
  if(!username||!password)return showAuthError('Fill in username and password');
  try{const d=await api('POST','/api/auth/signup',{username,password,email});onLogin(d)}
  catch(e){showAuthError(e.message)}
}
function onLogin(data){
  token=data.token;currentUser=data.username;
  localStorage.setItem('arcave_token',token);
  localStorage.setItem('arcave_user',currentUser);
  document.getElementById('navUsername').textContent=currentUser;
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').style.display='block';
  loadAll();
}
function logout(){
  token=null;currentUser=null;books=[];journalEntries=[];
  localStorage.removeItem('arcave_token');localStorage.removeItem('arcave_user');
  document.getElementById('appScreen').style.display='none';
  document.getElementById('authScreen').classList.add('active');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('authError').classList.remove('show');
}

// ── LOAD ──
async function loadAll(){
  document.getElementById('shelfGrid').innerHTML='<div class="loading">Loading…</div>';
  try{
    [books,journalEntries]=await Promise.all([api('GET','/api/books'),api('GET','/api/journal')]);
    if(books.length===0){
      const hadLocal=localStorage.getItem('arcave_v2')||localStorage.getItem('arcave_library');
      if(hadLocal) document.getElementById('importBanner').style.display='flex';
      else if(confirm('Import your 463-book library to get started?')) await importSeedData();
    } else {
      const hadLocal=localStorage.getItem('arcave_v2')||localStorage.getItem('arcave_library');
      if(hadLocal) document.getElementById('importBanner').style.display='flex';
    }
    renderStats();renderGrid();renderJournal();populateBookSelect();
  }catch(e){
    if(e.message.includes('expired')||e.message.includes('Invalid')) logout();
    else document.getElementById('shelfGrid').innerHTML='<div class="empty">Could not load. Check connection.</div>';
  }
}

async function importSeedData(){
  try{
    await api('POST','/api/books/import',{books:SEED});
    books=await api('GET','/api/books');
    renderStats();renderGrid();populateBookSelect();
    alert('Imported '+books.length+' books!');
  }catch(e){alert('Import failed: '+e.message)}
}
async function importLocalData(){
  const raw=localStorage.getItem('arcave_v2')||localStorage.getItem('arcave_library');
  if(!raw)return;
  try{
    const local=JSON.parse(raw);
    const r=await api('POST','/api/books/import',{books:local});
    books=await api('GET','/api/books');
    dismissImport();renderStats();renderGrid();populateBookSelect();
    alert(`Imported ${r.imported} books!`);
  }catch(e){alert('Import failed: '+e.message)}
}
function dismissImport(){
  document.getElementById('importBanner').style.display='none';
  localStorage.removeItem('arcave_v2');localStorage.removeItem('arcave_library');
}

// ── JOURNAL TOGGLE ──
function toggleJournal(){
  showingJournal=!showingJournal;
  document.getElementById('journalView').style.display=showingJournal?'block':'none';
  document.getElementById('libraryView').style.display=showingJournal?'none':'block';
  document.getElementById('statsBar').style.display=showingJournal?'none':'flex';
  document.getElementById('journalToggle').classList.toggle('active',showingJournal);
  document.getElementById('fabBtn').title=showingJournal?'New entry':'Add book';
  document.getElementById('fabBtn').textContent=showingJournal?'✦':'+';
  if(showingJournal) document.getElementById('composerText').focus();
}
function fabAction(){
  if(showingJournal) document.getElementById('composerText').focus();
  else openAddModal();
}

// ── JOURNAL ──
function populateBookSelect(){
  const sel=document.getElementById('composerBook');
  const cur=sel.value;
  sel.innerHTML='<option value="">— no book —</option>';
  const reading=[...books].filter(b=>b.status==='reading'||b.status==='read')
    .sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  reading.forEach(b=>{
    const o=document.createElement('option');
    o.value=b.id;o.textContent=b.title+(b.author?` — ${b.author}`:'');
    sel.appendChild(o);
  });
  if(cur) sel.value=cur;
}

document.getElementById('composerText').addEventListener('input',function(){
  document.getElementById('composerChar').textContent=this.value.length+' chars';
});

function clearComposer(){
  document.getElementById('composerText').value='';
  document.getElementById('composerBook').value='';
  document.getElementById('composerChar').textContent='0 chars';
}

async function submitEntry(){
  const content=document.getElementById('composerText').value.trim();
  if(!content)return;
  const bookId=document.getElementById('composerBook').value;
  const bookTitle=bookId ? (books.find(b=>String(b.id)===bookId)||{}).title||'' : '';
  try{
    const entry=await api('POST','/api/journal',{content,book_id:bookId||null,book_title:bookTitle});
    journalEntries.unshift(entry);
    clearComposer();
    renderJournal();
    document.getElementById('journalFeed').firstElementChild?.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){alert('Failed: '+e.message)}
}

function renderJournal(){
  document.getElementById('journalCount').textContent=
    journalEntries.length+' entr'+(journalEntries.length===1?'y':'ies');
  const feed=document.getElementById('journalFeed');
  if(!journalEntries.length){
    feed.innerHTML='<div class="journal-empty">Your journal is empty. Write your first entry above.</div>';
    return;
  }

  // Group by date
  const groups={};
  journalEntries.forEach(e=>{
    const d=new Date(e.created_at);
    const key=d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    if(!groups[key])groups[key]=[];
    groups[key].push(e);
  });

  feed.innerHTML=Object.entries(groups).map(([date,entries])=>`
    <div style="margin-bottom:4px">
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;padding:0 2px;margin-bottom:10px">${date}</div>
      ${entries.map(e=>`
        <div class="journal-entry" id="entry-${e.id}">
          <div class="entry-meta">
            <span class="entry-date">${fmtTime(e.created_at)}</span>
            ${e.book_title?`<span class="entry-book-tag">${esc(e.book_title)}</span>`:''}
            <div class="entry-actions">
              <button class="entry-act-btn" onclick="editEntry(${e.id})">Edit</button>
              <button class="entry-act-btn del" onclick="deleteEntry(${e.id})">Delete</button>
            </div>
          </div>
          <div class="entry-content" id="content-${e.id}">${esc(e.content)}</div>
          <textarea class="entry-edit-area" id="edit-${e.id}" rows="4">${esc(e.content)}</textarea>
          <div class="entry-edit-footer" id="editfooter-${e.id}">
            <button class="btn btn-ghost" onclick="cancelEdit(${e.id})">Cancel</button>
            <button class="btn btn-primary" onclick="saveEntry(${e.id})">Save</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function editEntry(id){
  document.getElementById('content-'+id).style.display='none';
  document.getElementById('edit-'+id).style.display='block';
  document.getElementById('editfooter-'+id).style.display='flex';
  document.getElementById('edit-'+id).focus();
}
function cancelEdit(id){
  document.getElementById('content-'+id).style.display='block';
  document.getElementById('edit-'+id).style.display='none';
  document.getElementById('editfooter-'+id).style.display='none';
}
async function saveEntry(id){
  const content=document.getElementById('edit-'+id).value.trim();
  if(!content)return;
  try{
    const updated=await api('PATCH',`/api/journal/${id}`,{content});
    const i=journalEntries.findIndex(e=>e.id===id);
    if(i>-1) journalEntries[i]=updated;
    renderJournal();
  }catch(e){alert('Failed: '+e.message)}
}
async function deleteEntry(id){
  if(!confirm('Delete this entry?'))return;
  try{
    await api('DELETE',`/api/journal/${id}`);
    journalEntries=journalEntries.filter(e=>e.id!==id);
    renderJournal();
  }catch(e){alert('Failed: '+e.message)}
}

// ── LIBRARY ──
function getFiltered(){
  let list=books.map((b,i)=>({...b,_i:i}));
  if(currentFilter!=='all') list=list.filter(b=>b.status===currentFilter);
  if(currentSearch){const q=currentSearch.toLowerCase();list=list.filter(b=>(b.title||'').toLowerCase().includes(q)||(b.author||'').toLowerCase().includes(q)||(b.genre||'').toLowerCase().includes(q))}
  list.sort((a,b)=>{
    if(currentSort==='author') return(a.author||'').localeCompare(b.author||'');
    if(currentSort==='title') return(a.title||'').localeCompare(b.title||'');
    if(currentSort==='rating') return(b.rating||0)-(a.rating||0);
    if(currentSort==='year') return(b.year||'0').localeCompare(a.year||'0');
    if(currentSort==='pages') return(parseInt(b.pages)||0)-(parseInt(a.pages)||0);
    if(currentSort==='status') return(STATUS_ORDER[a.status]||5)-(STATUS_ORDER[b.status]||5);
    return 0;
  });
  return list;
}
function renderStats(){
  document.getElementById('sTotal').textContent=books.length;
  document.getElementById('sRead').textContent=books.filter(b=>b.status==='read').length;
  document.getElementById('sReading').textContent=books.filter(b=>b.status==='reading').length;
  document.getElementById('sOwned').textContent=books.filter(b=>b.status==='owned-unread').length;
  document.getElementById('sWant').textContent=books.filter(b=>b.status==='want-to-read').length;
  document.getElementById('sBuy').textContent=books.filter(b=>b.status==='want-to-buy').length;
  const rated=books.filter(b=>b.rating>0);
  document.getElementById('sRated').textContent=rated.length;
  document.getElementById('sAvg').textContent=rated.length?(rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1):'—';
}
function renderGrid(){
  const list=getFiltered();
  document.getElementById('resultInfo').textContent=`${list.length} book${list.length!==1?'s':''} shown`;
  const grid=document.getElementById('shelfGrid');
  if(!list.length){grid.innerHTML='<div class="empty">No books found.</div>';return}
  grid.innerHTML=list.map(b=>{
    const ph=hashColor((b.title||'')+(b.author||''));
    const rc=b.read_count||0;
    const cover=b.cover?`<img class="cover-img" src="${esc(b.cover)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`:'';
    const phStyle=b.cover?'style="display:none"':'';
    return`<div class="book-card" data-i="${b._i}">
  <div class="cover-wrap">
    ${cover}
    <div class="cover-placeholder ${ph}" ${phStyle}><div class="ph-title">${esc(b.title)}</div><div class="ph-author">${esc(b.author)}</div></div>
    <div class="status-dot ${b.status||'unread'}"></div>
    ${rc>1?`<div class="reread-badge">×${rc}</div>`:''}
    <div class="rating-wrap" data-i="${b._i}" onclick="event.stopPropagation()">
      ${[1,2,3,4,5].map(i=>`<span class="star ${i<=(b.rating||0)?'filled':''}" data-v="${i}">★</span>`).join('')}
    </div>
  </div>
  <div class="book-meta">
    <div class="book-title-sm">${esc(b.title)}</div>
    <div class="book-author-sm">${esc(b.author)}</div>
  </div>
</div>`;
  }).join('');
}

// ── BOOK MODAL ──
function openModal(idx,isNew=false){
  openIdx=idx;const b=books[idx];
  const ph=hashColor((b.title||'')+(b.author||''));
  const metaParts=[];if(b.year)metaParts.push(b.year);if(b.pages)metaParts.push(b.pages+' pages');
  const rc=b.read_count||0;
  const cover=b.cover?`<img class="modal-cover-el" src="${esc(b.cover)}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`:'';
  const phd=b.cover?'style="display:none"':'';
  document.getElementById('modalHeader').innerHTML=`<div class="modal-header">
    ${cover}<div class="modal-cover-ph ${ph}" ${phd}>${esc(b.title)}</div>
    <div class="modal-title-block">
      <div class="modal-title">${esc(b.title)}</div>
      <div class="modal-author">${esc(b.author)||'Unknown author'}</div>
      ${metaParts.length?`<div class="modal-meta-row">${metaParts.join(' · ')}</div>`:''}
      <div class="modal-status-row">
        <span class="status-pill ${b.status||'unread'}" onclick="cycleStatus()">${STATUS_LABELS[b.status]||b.status}</span>
        ${rc>1?`<span class="reread-count">Read ×${rc}</span>`:''}
      </div>
      <div><div class="modal-stars-label">Your rating</div>
      <div class="modal-stars" id="modalStars">
        ${[1,2,3,4,5].map(i=>`<span class="modal-star ${i<=(b.rating||0)?'filled':''}" data-v="${i}">★</span>`).join('')}
      </div></div>
    </div>
  </div>`;
  const gr=b.gr_review||b.grReview||'';
  document.getElementById('modalBody').innerHTML=`
    <div class="field-group"><label>Cover URL</label><input type="text" id="mCover" value="${esc(b.cover||'')}" placeholder="https://…"></div>
    <div class="field-group"><label>Genre / Tags</label><input type="text" id="mGenre" value="${esc(b.genre||'')}" placeholder="Fiction, Contemporary…"></div>
    <div class="dates-row">
      <div class="field-group"><label>Started</label><input type="text" id="mStart" value="${esc(b.start_date||b.start||'')}" placeholder="DD.MM.YYYY"></div>
      <div class="field-group"><label>Finished</label><input type="text" id="mFinish" value="${esc(b.finish_date||b.finish||'')}" placeholder="DD.MM.YYYY"></div>
    </div>
    <div class="field-group"><label>Notes while reading</label><textarea id="mNotesD" rows="3">${esc(b.notes_during||b.notesDuring||'')}</textarea></div>
    <div class="field-group"><label>Notes after finishing</label><textarea id="mNotesA" rows="3">${esc(b.notes_after||b.notesAfter||'')}</textarea></div>
    ${gr?`<div><div class="gr-label">Goodreads note</div><div class="gr-review-box">${esc(gr)}</div></div>`:''}`;
  document.getElementById('modalFooter').innerHTML=`
    ${isNew?'':`<button class="btn btn-danger" onclick="deleteBook()">Delete</button>`}
    ${b.status==='read'?`<button class="btn btn-reread" onclick="markReread()">Mark Reread</button>`:''}
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveModal()">Save</button>`;
  document.getElementById('modalStars').addEventListener('click',e=>{
    const v=parseInt(e.target.dataset.v);if(!v)return;
    const cur=books[openIdx].rating||0;
    books[openIdx].rating=cur===v?0:v;
    document.querySelectorAll('.modal-star').forEach((s,i)=>s.classList.toggle('filled',i<books[openIdx].rating));
  });
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');openIdx=null}
function cycleStatus(){
  if(openIdx===null)return;
  const i=STATUS_CYCLE.indexOf(books[openIdx].status||'unread');
  books[openIdx].status=STATUS_CYCLE[(i+1)%STATUS_CYCLE.length];
  const pill=document.querySelector('.status-pill');
  pill.textContent=STATUS_LABELS[books[openIdx].status];
  pill.className='status-pill '+books[openIdx].status;
}
async function saveModal(){
  if(openIdx===null)return;
  const b=books[openIdx];
  const updates={
    cover:document.getElementById('mCover').value.trim(),
    genre:document.getElementById('mGenre').value.trim(),
    start_date:document.getElementById('mStart').value.trim(),
    finish_date:document.getElementById('mFinish').value.trim(),
    notes_during:document.getElementById('mNotesD').value.trim(),
    notes_after:document.getElementById('mNotesA').value.trim(),
    status:b.status,rating:b.rating||0,
  };
  if(updates.finish_date&&b.status==='reading') updates.status='read';
  try{
    const updated=await api('PATCH',`/api/books/${b.id}`,updates);
    books[openIdx]={...b,...updated};
    renderStats();renderGrid();closeModal();
  }catch(e){alert('Save failed: '+e.message)}
}
async function markReread(){
  if(openIdx===null)return;
  const b=books[openIdx];const rc=(b.read_count||1)+1;
  try{await api('PATCH',`/api/books/${b.id}`,{read_count:rc});books[openIdx].read_count=rc;renderStats();renderGrid();closeModal()}
  catch(e){alert('Failed: '+e.message)}
}
async function deleteBook(){
  if(openIdx===null)return;
  if(!confirm('Remove this book?'))return;
  try{await api('DELETE',`/api/books/${books[openIdx].id}`);books.splice(openIdx,1);renderStats();renderGrid();closeModal()}
  catch(e){alert('Failed: '+e.message)}
}
async function openAddModal(){
  const title=prompt('Book title:');if(!title)return;
  const dup=books.find(b=>(b.title||'').toLowerCase()===title.toLowerCase().trim());
  if(dup){alert('"'+dup.title+'" is already in your library.');return}
  const author=prompt('Author:');if(author===null)return;
  const sc=prompt('Status? 1=Read 2=Reading 3=Owned 4=WantToRead 5=WantToBuy','1');
  const statMap={'1':'read','2':'reading','3':'owned-unread','4':'want-to-read','5':'want-to-buy'};
  const status=statMap[sc?.trim()]||'unread';
  try{
    const nb=await api('POST','/api/books',{title:title.trim(),author:author.trim(),status,read_count:status==='read'?1:0,rating:0});
    books.push(nb);renderStats();renderGrid();populateBookSelect();
    openModal(books.length-1,true);
  }catch(e){alert('Failed: '+e.message)}
}
function exportData(){
  const blob=new Blob([JSON.stringify({books,journal:journalEntries},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='arcave_backup.json';a.click();
}

// ── EVENTS ──
document.getElementById('shelfGrid').addEventListener('click',e=>{
  const star=e.target.closest('.star');
  if(star){
    e.stopPropagation();
    const wrap=star.closest('.rating-wrap');
    const idx=parseInt(wrap.dataset.i);
    const v=parseInt(star.dataset.v);
    const cur=books[idx].rating||0;
    const nr=cur===v?0:v;
    books[idx].rating=nr;
    wrap.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('filled',i<nr));
    api('PATCH',`/api/books/${books[idx].id}`,{rating:nr}).catch(console.error);
    return;
  }
  const card=e.target.closest('.book-card');
  if(card) openModal(parseInt(card.dataset.i));
});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');currentFilter=btn.dataset.filter;renderGrid();
  });
});
document.getElementById('searchInput').addEventListener('input',e=>{currentSearch=e.target.value.trim();renderGrid()});
document.getElementById('sortSelect').addEventListener('change',e=>{currentSort=e.target.value;renderGrid()});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal()});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&showingJournal) submitEntry();
});
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('signupEmail').addEventListener('keydown',e=>{if(e.key==='Enter')doSignup()});

// ── INIT ──
if(token){
  api('GET','/api/auth/me').then(d=>{
    currentUser=d.username;
    document.getElementById('navUsername').textContent=currentUser;
    document.getElementById('authScreen').classList.remove('active');
    document.getElementById('appScreen').style.display='block';
    loadAll();
  }).catch(()=>logout());
}
</script>
