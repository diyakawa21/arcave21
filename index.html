<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arcave · library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── THEME ── */
:root {
  --ink: #0d0d12; --paper: #f5f2eb; --ash: #c4bfb3; --smoke: #7a7570;
  --accent: #c4783a; --surface: #12121a; --surface2: #16161f;
  --border: #2a2a38; --border2: #1e1e2a;
}
[data-theme="light"] {
  --ink: #f0ece3; --paper: #1a1a2e; --ash: #4a4560; --smoke: #8a8590;
  --surface: #e8e4db; --surface2: #dedad0; --border: #ccc8be; --border2: #d4d0c6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ink); color: var(--paper); font-family: "EB Garamond", Georgia, serif; font-size: 16px; min-height: 100vh; transition: background .25s, color .25s; }

/* ── AUTH ── */
.auth-screen { display:none; position:fixed; inset:0; z-index:500; background:var(--ink); align-items:center; justify-content:center; padding:20px; }
.auth-screen.active { display:flex; }
.auth-box { width:100%; max-width:380px; }
.auth-logo { font-family:"Space Mono",monospace; font-size:22px; font-weight:700; letter-spacing:.12em; color:var(--accent); margin-bottom:4px; }
.auth-logo span { color:var(--ash); font-weight:400; }
.auth-sub { font-family:"Space Mono",monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.1em; margin-bottom:36px; }
.auth-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:24px; }
.auth-tab { font-family:"Space Mono",monospace; font-size:11px; text-transform:uppercase; letter-spacing:.08em; padding:8px 20px; cursor:pointer; color:var(--smoke); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
.auth-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.auth-form { display:flex; flex-direction:column; gap:14px; }
.auth-field label { display:block; font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px; }
.auth-field input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--paper); font-family:"Space Mono",monospace; font-size:13px; padding:11px 14px; outline:none; transition:border-color .2s; }
.auth-field input:focus { border-color:var(--accent); }
.auth-field input::placeholder { color:var(--smoke); }
.auth-btn { background:var(--accent); border:none; border-radius:4px; color:#fff; font-family:"Space Mono",monospace; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; padding:12px; cursor:pointer; transition:opacity .2s; margin-top:4px; }
.auth-btn:hover { opacity:.85; }
.auth-error { font-family:"Space Mono",monospace; font-size:10px; color:#e06b6b; background:rgba(224,107,107,.08); border:1px solid rgba(224,107,107,.2); border-radius:3px; padding:8px 12px; display:none; margin-bottom:4px; }
.auth-error.show { display:block; }

/* ── NAV ── */
nav { position:sticky; top:0; z-index:100; background:rgba(13,13,18,.97); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:12px; height:56px; }
[data-theme="light"] nav { background:rgba(240,236,227,.97); }
.nav-brand { font-family:"Space Mono",monospace; font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); white-space:nowrap; }
.nav-brand span { color:var(--ash); font-weight:400; }
.search-wrap { flex:1; max-width:320px; position:relative; min-width:80px; }
.search-wrap input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--paper); font-family:"Space Mono",monospace; font-size:12px; padding:8px 12px 8px 32px; outline:none; transition:border-color .2s; }
.search-wrap input:focus { border-color:var(--accent); }
.search-wrap input::placeholder { color:var(--smoke); }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--smoke); font-size:14px; pointer-events:none; }
.nav-filters { display:flex; gap:3px; }
.filter-btn { background:none; border:1px solid var(--border); border-radius:3px; color:var(--ash); font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.05em; text-transform:uppercase; padding:5px 8px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.filter-btn:hover { border-color:var(--ash); color:var(--paper); }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.nav-right { margin-left:auto; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.nav-btn { font-family:"Space Mono",monospace; font-size:10px; background:none; border:1px solid var(--border); border-radius:3px; color:var(--ash); padding:5px 9px; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; transition:all .15s; white-space:nowrap; }
.nav-btn:hover, .nav-btn.active { background:rgba(196,120,58,.1); border-color:var(--accent); color:var(--accent); }
.nav-username { font-family:"Space Mono",monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.06em; }
.nav-logout { font-family:"Space Mono",monospace; font-size:9px; color:#4a4a5a; background:none; border:1px solid var(--border); border-radius:3px; padding:4px 8px; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; transition:all .15s; }
.nav-logout:hover { border-color:var(--smoke); color:var(--ash); }

/* ── STATS BAR ── */
.stats-bar { background:var(--surface); border-bottom:1px solid var(--border2); padding:10px 20px; display:flex; gap:18px; align-items:center; font-family:"Space Mono",monospace; overflow-x:auto; }
.stat { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
.stat-n { font-size:20px; font-weight:700; line-height:1; }
.stat-l { color:var(--smoke); text-transform:uppercase; letter-spacing:.07em; font-size:9px; }
.s-read{color:#4caf82}.s-reading{color:#d4a459}.s-owned{color:#9b7ec8}.s-unread{color:#7c8fd0}
.stats-div { width:1px; height:30px; background:var(--border); flex-shrink:0; }
.sort-wrap { margin-left:auto; display:flex; align-items:center; gap:8px; font-family:"Space Mono",monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.07em; flex-shrink:0; }
.sort-wrap select { background:var(--surface2); border:1px solid var(--border); border-radius:3px; color:var(--paper); font-family:"Space Mono",monospace; font-size:10px; padding:4px 8px; outline:none; cursor:pointer; }

/* ── GRID VIEW ── */
.result-info { font-family:"Space Mono",monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; }
.shelf-grid { display:grid; grid-template-columns:repeat(auto-fill,140px); gap:18px 12px; }
.book-card { width:140px; cursor:pointer; }
.cover-wrap { width:140px; height:210px; position:relative; border-radius:3px 6px 6px 3px; overflow:hidden; box-shadow:-2px 2px 0 #000,3px 6px 18px rgba(0,0,0,.6); transition:transform .2s,box-shadow .2s; }
.book-card:hover .cover-wrap { transform:translateY(-4px) rotate(-1deg); box-shadow:-2px 2px 0 #000,6px 14px 28px rgba(0,0,0,.7); }
.cover-img { width:100%; height:100%; object-fit:cover; display:block; }
.cover-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12px; text-align:center; }
.ph-title { font-family:"EB Garamond",serif; font-style:italic; font-size:13px; line-height:1.35; color:rgba(255,255,255,.9); margin-bottom:6px; }
.ph-author { font-family:"Space Mono",monospace; font-size:8px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.05em; }
.cover-wrap::before { content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background:rgba(0,0,0,.35); z-index:2; }
.status-dot { position:absolute; top:6px; right:6px; z-index:3; width:8px; height:8px; border-radius:50%; border:1.5px solid rgba(0,0,0,.4); }
.status-dot.read{background:#4caf82}.status-dot.reading{background:#d4a459}.status-dot.unread{background:rgba(255,255,255,.15)}
.owned-dot { position:absolute; top:6px; left:12px; z-index:3; width:8px; height:8px; border-radius:50%; background:#9b7ec8; border:1.5px solid rgba(0,0,0,.4); }
.reread-badge { position:absolute; bottom:6px; left:12px; z-index:3; background:var(--accent); color:#fff; font-family:"Space Mono",monospace; font-size:7px; padding:2px 4px; border-radius:2px; }
.rating-wrap { position:absolute; bottom:5px; left:0; right:0; display:flex; justify-content:center; gap:2px; z-index:3; }
.star { font-size:9px; cursor:pointer; color:rgba(255,255,255,.15); line-height:1; }
.star.filled { color:#f0c040; }
.rating-wrap:hover .star { color:#f0c040; }
.rating-wrap .star:hover ~ .star { color:rgba(255,255,255,.15) !important; }
.book-meta { padding:7px 2px 0; }
.book-title-sm { font-family:"EB Garamond",serif; font-style:italic; font-size:12px; line-height:1.3; color:var(--ash); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.book-author-sm { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

/* ── GRID PALETTES ── */
.ph-0{background:linear-gradient(145deg,#1a2a4a,#2d1a4a)}.ph-1{background:linear-gradient(145deg,#2a1a1a,#4a1a2a)}
.ph-2{background:linear-gradient(145deg,#1a2a1a,#1a3a2a)}.ph-3{background:linear-gradient(145deg,#2a2a1a,#3a2a0a)}
.ph-4{background:linear-gradient(145deg,#1a1a3a,#0a1a4a)}.ph-5{background:linear-gradient(145deg,#2a1a2a,#1a0a3a)}
.ph-6{background:linear-gradient(145deg,#1a3030,#0a2030)}.ph-7{background:linear-gradient(145deg,#302010,#201000)}
.ph-8{background:linear-gradient(145deg,#201a30,#100a28)}.ph-9{background:linear-gradient(145deg,#0a2020,#0a3030)}

/* ── SHELF/ROOM VIEW ── */
#shelfRoomView { display:none; padding:0 0 80px; }
#shelfRoomView.active { display:block; }
.room-section { margin-bottom:8px; }
.room-section-header { padding:28px 28px 10px; display:flex; align-items:baseline; gap:14px; }
.room-section-name { font-family:"EB Garamond",serif; font-size:26px; font-style:italic; color:var(--paper); }
.room-section-count { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); text-transform:uppercase; letter-spacing:.1em; }
.room-plank {
  display:flex; align-items:flex-end;
  padding:0 28px;
  height:240px;
  background: linear-gradient(to bottom,
    transparent 200px,
    #5a3a1a 200px, #4a2e10 208px, #3a2208 216px
  );
  border-left:10px solid #3a2208;
  border-right:10px solid #3a2208;
  overflow-x:auto; overflow-y:hidden;
  gap:2px;
  flex-wrap:nowrap;
}
[data-theme="light"] .room-plank {
  background: linear-gradient(to bottom,
    transparent 200px,
    #8B6914 200px, #7a5a10 208px, #6a4a08 216px
  );
  border-left:10px solid #6a4a08;
  border-right:10px solid #6a4a08;
}
.room-plank::-webkit-scrollbar { height:3px; }
.room-plank::-webkit-scrollbar-thumb { background:#3a2208; border-radius:2px; }
.room-divider { height:1px; background:linear-gradient(to right,transparent,var(--border),transparent); margin:12px 28px; }

/* ── SPINE BOOKS ── */
.spine-book {
  width:32px; min-width:32px; height:200px;
  flex-shrink:0; cursor:pointer; position:relative;
  border-radius:2px 2px 0 0;
  overflow:hidden;
  transition:transform .15s;
  box-shadow: 2px 0 4px rgba(0,0,0,.5), inset -2px 0 4px rgba(0,0,0,.3), inset 1px 0 2px rgba(255,255,255,.07);
}
.spine-book:hover { transform:translateY(-12px); z-index:5; filter:brightness(1.2); }
.spine-book::after { content:""; position:absolute; left:0; top:0; width:4px; height:100%; background:rgba(0,0,0,.35); }
.spine-text {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  /* Rotate the text container so text reads bottom-to-top */
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  padding:6px 4px;
  gap:0;
}
.spine-title-text {
  font-family:"EB Garamond",serif; font-style:italic;
  font-size:11px; color:rgba(255,255,255,.92);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  max-height:140px; width:100%;
  text-align:center;
  letter-spacing:.03em;
  line-height:1;
  text-shadow:0 1px 3px rgba(0,0,0,.6);
}
.spine-author-text {
  font-family:"Space Mono",monospace;
  font-size:6.5px; color:rgba(255,255,255,.35);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  max-height:50px; width:100%;
  text-align:center;
  text-transform:uppercase; letter-spacing:.06em;
  margin-top:4px;
  line-height:1;
}
.spine-status-dot {
  position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
  width:5px; height:5px; border-radius:50%;
  border:1px solid rgba(0,0,0,.3);
}
.spine-status-dot.read{background:#4caf82}
.spine-status-dot.reading{background:#d4a459}
.spine-status-dot.unread{background:rgba(255,255,255,.15)}
.spine-owned-pip { position:absolute; top:5px; left:50%; transform:translateX(-50%); width:5px; height:5px; border-radius:50%; background:#9b7ec8; }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.78); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:16px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface2); border:1px solid var(--border); border-radius:8px; max-width:680px; width:100%; max-height:92vh; overflow-y:auto; display:flex; flex-direction:column; }
.modal-header { display:flex; gap:20px; padding:24px; border-bottom:1px solid var(--border2); }
.modal-cover-el { width:90px; height:135px; flex-shrink:0; border-radius:2px 5px 5px 2px; object-fit:cover; box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5); }
.modal-cover-ph { width:90px; height:135px; flex-shrink:0; border-radius:2px 5px 5px 2px; display:flex; align-items:center; justify-content:center; font-family:"EB Garamond",serif; font-style:italic; font-size:10px; color:rgba(255,255,255,.7); text-align:center; padding:8px; box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5); }
.modal-title-block { flex:1; min-width:0; }
.modal-title { font-size:22px; font-style:italic; line-height:1.2; margin-bottom:4px; }
.modal-author { font-family:"Space Mono",monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
.modal-meta-row { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); margin-bottom:12px; }
.modal-status-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
.status-pill { font-family:"Space Mono",monospace; font-size:9px; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.06em; font-weight:700; cursor:pointer; border:1.5px solid transparent; transition:all .15s; }
.status-pill.read{background:rgba(74,176,120,.15);color:#4caf82;border-color:rgba(74,176,120,.3)}
.status-pill.reading{background:rgba(212,164,89,.15);color:#d4a459;border-color:rgba(212,164,89,.3)}
.status-pill.unread{background:rgba(124,143,208,.1);color:#7c8fd0;border-color:rgba(124,143,208,.2)}
.status-pill:hover{opacity:.75}
.reread-count { font-family:"Space Mono",monospace; font-size:9px; color:var(--accent); background:rgba(196,120,58,.1); border:1px solid rgba(196,120,58,.25); border-radius:20px; padding:3px 9px; }
.owned-toggle { display:flex; gap:6px; align-items:center; margin-top:8px; }
.owned-toggle label { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; }
.owned-btn { font-family:"Space Mono",monospace; font-size:9px; padding:3px 10px; border-radius:20px; cursor:pointer; border:1.5px solid var(--border); background:none; color:var(--smoke); transition:all .15s; }
.owned-btn.active { background:rgba(155,126,200,.15); color:#9b7ec8; border-color:rgba(155,126,200,.3); }
.modal-stars-label { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; margin-top:8px; }
.modal-stars { display:flex; gap:3px; }
.modal-star { font-size:20px; cursor:pointer; color:rgba(255,255,255,.12); }
.modal-star.filled { color:#f0c040; }
[data-theme="light"] .modal-star { color:rgba(0,0,0,.15); }
.modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
.field-group label { display:block; font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; }
.field-group textarea, .field-group input[type=text] { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--paper); font-family:"EB Garamond",serif; font-size:15px; padding:9px 11px; outline:none; resize:vertical; transition:border-color .2s; line-height:1.5; }
.field-group textarea:focus, .field-group input[type=text]:focus { border-color:var(--accent); }
.gr-review-box { background:var(--surface); border:1px solid var(--border2); border-radius:4px; padding:10px 12px; font-family:"EB Garamond",serif; font-style:italic; font-size:14px; color:var(--smoke); line-height:1.5; }
.gr-label { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; opacity:.5; }
.dates-row { display:flex; gap:12px; }
.dates-row .field-group { flex:1; }
.modal-footer { padding:14px 24px; border-top:1px solid var(--border2); display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
.btn { font-family:"Space Mono",monospace; font-size:10px; text-transform:uppercase; letter-spacing:.07em; padding:8px 16px; border-radius:4px; cursor:pointer; border:1px solid; transition:all .15s; }
.btn-ghost { background:none; border-color:var(--border); color:var(--ash); }
.btn-ghost:hover { border-color:var(--ash); color:var(--paper); }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-primary:hover { opacity:.85; }
.btn-reread { background:none; border-color:rgba(196,120,58,.4); color:var(--accent); }
.btn-reread:hover { background:rgba(196,120,58,.1); }
.btn-danger { background:none; border-color:rgba(200,60,60,.3); color:#c84444; margin-right:auto; }
.btn-danger:hover { background:rgba(200,60,60,.1); }

/* ── JOURNAL ── */
#journalView { display:none; padding:0 0 80px; }
.journal-header { padding:28px 24px 20px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1px solid var(--border2); }
.journal-title { font-size:28px; font-style:italic; }
.journal-count { font-family:"Space Mono",monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; }
.journal-composer { margin:24px 24px 0; background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.journal-composer:focus-within { border-color:rgba(196,120,58,.4); }
.composer-book-tag { padding:10px 14px 0; display:flex; align-items:center; gap:8px; }
.composer-book-tag select { background:var(--surface2); border:1px solid var(--border); border-radius:3px; color:var(--ash); font-family:"Space Mono",monospace; font-size:10px; padding:4px 8px; outline:none; max-width:260px; cursor:pointer; }
.composer-book-tag label { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); text-transform:uppercase; letter-spacing:.08em; }
.composer-textarea { width:100%; background:transparent; border:none; color:var(--paper); font-family:"EB Garamond",serif; font-size:17px; padding:14px 16px; outline:none; resize:none; line-height:1.65; min-height:120px; }
.composer-textarea::placeholder { color:var(--smoke); opacity:.5; }
.composer-footer { padding:8px 12px; display:flex; justify-content:flex-end; gap:8px; border-top:1px solid var(--border2); }
.composer-char { font-family:"Space Mono",monospace; font-size:9px; color:var(--smoke); align-self:center; margin-right:auto; }
.journal-feed { padding:24px 24px 0; display:flex; flex-direction:column; gap:16px; }
.journal-entry { background:var(--surface); border:1px solid var(--border2); border-radius:6px; overflow:hidden; }
.journal-entry:hover { border-color:var(--border); }
.entry-meta { padding:12px 16px 0; display:flex; align-items:center; gap:10px; }
.entry-date { font-family:"Space Mono",monospace; font-size:10px; color:var(--smoke); text-transform:uppercase; letter-spacing:.07em; }
.entry-book-tag { font-family:"Space Mono",monospace; font-size:9px; color:var(--accent); background:rgba(196,120,58,.08); border:1px solid rgba(196,120,58,.15); border-radius:20px; padding:2px 8px; }
.entry-actions { margin-left:auto; display:flex; gap:6px; opacity:0; transition:opacity .15s; }
.journal-entry:hover .entry-actions { opacity:1; }
.entry-act-btn { font-family:"Space Mono",monospace; font-size:9px; background:none; border:1px solid var(--border); border-radius:3px; color:var(--smoke); padding:3px 7px; cursor:pointer; text-transform:uppercase; letter-spacing:.05em; }
.entry-act-btn:hover { border-color:var(--ash); color:var(--ash); }

.method-manual:hover, .method-isbn:hover { border-color:var(--ash); color:var(--paper); }

@keyframes scan{0%{top:0}100%{top:100%}}
.scanner-label { margin-top:24px; font-family:"Space Mono",monospace; font-size:11px; color:var(--ash); text-transform:uppercase; letter-spacing:.1em; }
.scanner-close { margin-top:16px; font-family:"Space Mono",monospace; font-size:10px; background:none; border:1px solid var(--border); border-radius:3px; color:var(--smoke); padding:7px 18px; cursor:pointer; text-transform:uppercase; }

// ── API ──
function api(method,path,body){
  var opts={method:method,headers:{"Content-Type":"application/json"}};
  if(token) opts.headers["Authorization"]="Bearer "+token;
  if(body) opts.body=JSON.stringify(body);
  return fetch(API+path,opts).then(function(res){
    return res.json().then(function(data){
      if(!res.ok) throw new Error(data.error||"Request failed");
      return data;
    });
  });
}

}
function onLogin(data){

function logout(){

// ── LOAD ──

// ── FILTER/SORT ──
function getFiltered(){
  var list=books.map(function(b,i){return Object.assign({},b,{_i:i})});
  if(currentFilter==="owned") list=list.filter(function(b){return b.owned});
  else if(currentFilter==="unowned") list=list.filter(function(b){return !b.owned});
  else if(currentFilter!=="all") list=list.filter(function(b){return b.status===currentFilter});
  if(currentSearch){
    var q=currentSearch.toLowerCase();
    list=list.filter(function(b){return(b.title||"").toLowerCase().indexOf(q)>-1||(b.author||"").toLowerCase().indexOf(q)>-1||(b.genre||"").toLowerCase().indexOf(q)>-1});
  }
  list.sort(function(a,b){
    if(currentSort==="author") return(a.author||"").localeCompare(b.author||"");
    if(currentSort==="title") return(a.title||"").localeCompare(b.title||"");
    if(currentSort==="rating") return(b.rating||0)-(a.rating||0);
    if(currentSort==="year") return(b.year||"0").localeCompare(a.year||"0");
    if(currentSort==="status"){var o={read:0,reading:1,unread:2};return(o[a.status]||2)-(o[b.status]||2)}
    return 0;
  });
  return list;
}

// ── STATS ──
function renderStats(){
  document.getElementById("sTotal").textContent=books.length;
  document.getElementById("sRead").textContent=books.filter(function(b){return b.status==="read"}).length;
  document.getElementById("sReading").textContent=books.filter(function(b){return b.status==="reading"}).length;
  document.getElementById("sOwned").textContent=books.filter(function(b){return b.owned}).length;
  document.getElementById("sUnread").textContent=books.filter(function(b){return b.status==="unread"}).length;
  var rated=books.filter(function(b){return b.rating>0});
  document.getElementById("sRated").textContent=rated.length;
  document.getElementById("sAvg").textContent=rated.length?(rated.reduce(function(s,b){return s+b.rating},0)/rated.length).toFixed(1):"-";
}

// ── GRID RENDER ──
function renderGrid(){
  var list=getFiltered();
  document.getElementById("resultInfo").textContent=list.length+" book"+(list.length!==1?"s":"")+" shown";
  var grid=document.getElementById("shelfGrid");
  if(!list.length){grid.innerHTML="<div class='empty'>No books found.</div>";return}
  var html="";
  list.forEach(function(b){
    var ph=hashColor((b.title||"")+(b.author||""));
    var rc=b.read_count||0;
    var cover=b.cover?"<img class='cover-img' src='"+esc(b.cover)+"' alt='' loading='lazy'>":"";
    var phd=b.cover?"style='display:none'":"";
    var stars="";for(var i=1;i<=5;i++) stars+="<span class='star "+(i<=(b.rating||0)?"filled":"")+"' data-v='"+i+"'>&#9733;</span>";
    html+="<div class='book-card' data-i='"+b._i+"'><div class='cover-wrap'>"+cover+"<div class='cover-placeholder "+ph+"' "+phd+"><div class='ph-title'>"+esc(b.title)+"</div><div class='ph-author'>"+esc(b.author)+"</div></div><div class='status-dot "+(b.status||"unread")+"'></div>"+(b.owned?"<div class='owned-dot'></div>":"")+(rc>1?"<div class='reread-badge'>x"+rc+"</div>":"")+"<div class='rating-wrap' data-i='"+b._i+"'>"+stars+"</div></div><div class='book-meta'><div class='book-title-sm'>"+esc(b.title)+"</div><div class='book-author-sm'>"+esc(b.author)+"</div></div></div>";
  });
  grid.innerHTML=html;
}

// ── SHELF ROOM RENDER ──
function renderShelfRoom(){
  var list=getFiltered();
  document.getElementById("resultInfo2").textContent=list.length+" book"+(list.length!==1?"s":"")+" shown";
  var container=document.getElementById("roomContainer");
  if(!list.length){container.innerHTML="<div class='empty'>No books found.</div>";return}

  // Group by genre
  var grouped={};
  GENRE_ORDER.forEach(function(g){grouped[g]=[]});
  grouped["Unsorted"]=[];
  list.forEach(function(b){
    var g=assignGenre(b);
    if(!grouped[g]) grouped[g]=[];
    grouped[g].push(b);
  });

  var html="";
  GENRE_ORDER.forEach(function(genre){
    var bks=grouped[genre];
    if(!bks||!bks.length) return;
    var color=GENRE_COLORS[genre]||"#111";

    html+="<div class='room-section'>";
    html+="<div class='room-section-header'><div class='room-section-name'>"+esc(genre)+"</div><div class='room-section-count'>"+bks.length+" book"+(bks.length!==1?"s":"")+"</div></div>";

    // Split into rows of 30
    for(var r=0;r<bks.length;r+=30){
      var row=bks.slice(r,r+30);
      html+="<div class='room-plank'>";
      row.forEach(function(b){
        var lastN=(b.author||"").split(" ").pop();
        html+="<div class='spine-book' data-i='"+b._i+"' style='background:"+color+"' title='"+esc(b.title)+" - "+esc(b.author)+"'>";
        html+="<div class='spine-text'>";
        html+="<div class='spine-title-text'>"+esc(b.title)+"</div>";
        if(lastN) html+="<div class='spine-author-text'>"+esc(lastN)+"</div>";
        html+="</div>";
        html+="<div class='spine-status-dot "+(b.status||"unread")+"'></div>";
        if(b.owned) html+="<div class='spine-owned-pip'></div>";
        html+="</div>";
      });
      html+="</div>";
    }
    html+="<div class='room-divider'></div></div>";
  });
  container.innerHTML=html;

  container.querySelectorAll(".spine-book").forEach(function(el){
    el.addEventListener("click",function(){openModal(parseInt(this.getAttribute("data-i")))});
  });
}

// ── MODAL ──

  document.getElementById("modalFooter").innerHTML=(isNew?"":"<button class='btn btn-danger' onclick='deleteBook()'>Delete</button>")+(b.status==="read"?"<button class='btn btn-reread' onclick='markReread()'>Mark Reread</button>":"")+"<button class='btn btn-ghost' onclick='closeModal()'>Cancel</button><button class='btn btn-primary' onclick='saveModal()'>Save</button>";

function closeModal(){document.getElementById("modalOverlay").classList.remove("open");openIdx=null}
function cycleStatus(){
  if(openIdx===null)return;
  var c=["unread","reading","read"];
  var i=c.indexOf(books[openIdx].status||"unread");
  books[openIdx].status=c[(i+1)%c.length];
  var pill=document.getElementById("statusPill");

  pill.className="status-pill "+books[openIdx].status;

function toggleOwned(){
  if(openIdx===null)return;
  books[openIdx].owned=!books[openIdx].owned;

  btn.textContent=books[openIdx].owned?"Yes":"No";
  btn.className="owned-btn "+(books[openIdx].owned?"active":"");
}
function saveModal(){
  if(openIdx===null)return;
  var b=books[openIdx];
  var u={cover:document.getElementById("mCover").value.trim(),genre:document.getElementById("mGenre").value.trim(),start_date:document.getElementById("mStart").value.trim(),finish_date:document.getElementById("mFinish").value.trim(),notes_during:document.getElementById("mNotesD").value.trim(),notes_after:document.getElementById("mNotesA").value.trim(),status:b.status,owned:b.owned||false,rating:b.rating||0};
  if(u.finish_date&&b.status==="reading") u.status="read";
  api("PATCH","/api/books/"+b.id,u).then(function(updated){
    books[openIdx]=Object.assign({},b,updated);
    renderStats();renderGrid();renderShelfRoom();closeModal();
  }).catch(function(e){alert("Save failed: "+e.message)});
}
function markReread(){
  if(openIdx===null)return;
  var b=books[openIdx];var rc=(b.read_count||1)+1;
  api("PATCH","/api/books/"+b.id,{read_count:rc}).then(function(){books[openIdx].read_count=rc;renderStats();renderGrid();renderShelfRoom();closeModal()}).catch(function(e){alert(e.message)});
}
function deleteBook(){
  if(openIdx===null)return;
  if(!confirm("Remove this book?"))return;
  api("DELETE","/api/books/"+books[openIdx].id).then(function(){books.splice(openIdx,1);renderStats();renderGrid();renderShelfRoom();closeModal()}).catch(function(e){alert(e.message)});
}

function closeAddMethod(){document.getElementById("addMethodOverlay").classList.remove("open")}
function addManually(){closeAddMethod();openAddModal()}
function openAddModal(){
  var title=prompt("Book title:");if(!title)return;

// ── SCANNER ──
function openScanner(){
  closeAddMethod();
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert("Camera not available. Use Type ISBN instead.");return;
  }
  document.getElementById("scannerOverlay").classList.add("open");
  scannedBookData=null;
  document.getElementById("bookPreview").classList.remove("show");
  document.getElementById("scannerLabel").textContent="Point camera at the barcode";
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(function(stream){
    scannerStream=stream;
    var video=document.getElementById("scannerVideo");
    video.srcObject=stream;video.play();
    scannerInterval=setInterval(function(){scanFrame(video)},300);
  }).catch(function(e){alert("Camera error: "+e.message);closeScanner()});
}
function closeScanner(){
  if(scannerStream) scannerStream.getTracks().forEach(function(t){t.stop()});
  if(scannerInterval) clearInterval(scannerInterval);
  scannerStream=null;scannerInterval=null;scannedBookData=null;
  document.getElementById("scannerOverlay").classList.remove("open");
  document.getElementById("bookPreview").classList.remove("show");
}
function resetScanner(){
  document.getElementById("bookPreview").classList.remove("show");
  document.getElementById("scannerLabel").textContent="Point camera at the barcode";
  scannedBookData=null;
  if(scannerStream&&!scannerInterval){
    scannerInterval=setInterval(function(){scanFrame(document.getElementById("scannerVideo"))},300);
  }
}
function scanFrame(video){
  if(!video.videoWidth) return;
  scanCanvas.width=video.videoWidth;scanCanvas.height=video.videoHeight;
  scanCtx.drawImage(video,0,0);
  if(window.BarcodeDetector){
    var det=new BarcodeDetector({formats:["ean_13","ean_8"]});
    det.detect(scanCanvas).then(function(codes){if(codes.length>0)onBarcodeDetected(codes[0].rawValue)}).catch(function(){});
  }
}
function onBarcodeDetected(isbn){
  if(scannedBookData)return;
  if(scannerInterval){clearInterval(scannerInterval);scannerInterval=null}
  document.getElementById("scannerLabel").textContent="Found "+isbn+" - Looking up...";
  lookupISBN(isbn);
}
function lookupISBN(isbn){
  isbn=isbn.replace(/[^0-9X]/gi,"");
  fetch("https://www.googleapis.com/books/v1/volumes?q=isbn:"+isbn).then(function(r){return r.json()}).then(function(data){
    if(!data.items||!data.items.length){
      document.getElementById("scannerLabel").textContent="Not found. Try again.";
      if(scannerStream) scannerInterval=setInterval(function(){scanFrame(document.getElementById("scannerVideo"))},300);
      return;
    }
    var info=data.items[0].volumeInfo;
    scannedBookData={title:info.title||"",author:(info.authors&&info.authors[0])||"",pages:String(info.pageCount||""),year:info.publishedDate?info.publishedDate.substring(0,4):"",cover:(info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail))||"",genre:(info.categories&&info.categories[0])||""};
    if(scannedBookData.cover) document.getElementById("previewCover").src=scannedBookData.cover;
    document.getElementById("previewCover").style.display=scannedBookData.cover?"block":"none";
    document.getElementById("previewTitle").textContent=scannedBookData.title;
    document.getElementById("previewAuthor").textContent=scannedBookData.author;
    var m=[];if(scannedBookData.year)m.push(scannedBookData.year);if(scannedBookData.pages)m.push(scannedBookData.pages+" pages");
    document.getElementById("previewMeta").textContent=m.join(" - ");
    document.getElementById("scannerLabel").textContent="";
    document.getElementById("bookPreview").classList.add("show");
  }).catch(function(){document.getElementById("scannerLabel").textContent="Lookup failed. Try again."});
}
function confirmScannedBook(){
  if(!scannedBookData)return;
  closeScanner();
  var b=scannedBookData;
  var dup=books.find(function(bk){return(bk.title||"").toLowerCase()===b.title.toLowerCase()});
  if(dup){alert(b.title+" is already in your library.");return}
  var sc=prompt("Read status: 1=Unread, 2=Reading, 3=Read","1");
  var statMap={"1":"unread","2":"reading","3":"read"};
  var status=statMap[(sc||"1").trim()]||"unread";
  var oa=prompt("Do you own this? y/n","y");
  var owned=oa&&oa.toLowerCase().indexOf("y")>-1;
  api("POST","/api/books",{title:b.title,author:b.author,status:status,owned:owned,pages:b.pages,year:b.year,cover:b.cover,genre:b.genre,read_count:status==="read"?1:0,rating:0}).then(function(nb){
    books.push(nb);renderStats();renderGrid();renderShelfRoom();populateBookSelect();
    openModal(books.length-1,true);
  }).catch(function(e){alert("Failed: "+e.message)});
}
function addByISBN(){
  closeAddMethod();
  var isbn=prompt("Enter ISBN:");if(!isbn)return;
  lookupISBN(isbn.replace(/[^0-9X]/gi,""));
  document.getElementById("scannerOverlay").classList.add("open");
  document.getElementById("scannerLabel").textContent="Looking up...";
}

  api("POST","/api/journal",{content:content,book_id:bookId||null,book_title:bookTitle}).then(function(e){journalEntries.unshift(e);clearComposer();renderJournal()}).catch(function(e){alert("Failed: "+e.message)});

function renderJournal(){

  var groups={};

  var html="";
  Object.keys(groups).forEach(function(date){
    html+="<div style='margin-bottom:4px'><div style='font-family:Space Mono,monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;padding:0 2px;margin-bottom:10px'>"+date+"</div>";

      html+="<div class='journal-entry' id='entry-"+e.id+"'><div class='entry-meta'><span class='entry-date'>"+fmtTime(e.created_at)+"</span>"+(e.book_title?"<span class='entry-book-tag'>"+esc(e.book_title)+"</span>":"")+"<div class='entry-actions'><button class='entry-act-btn' onclick='editEntry("+e.id+")'>Edit</button><button class='entry-act-btn del' onclick='deleteEntry("+e.id+")'>Delete</button></div></div><div class='entry-content' id='content-"+e.id+"'>"+esc(e.content)+"</div><textarea class='entry-edit-area' id='edit-"+e.id+"' rows='4'>"+esc(e.content)+"</textarea><div class='entry-edit-footer' id='editfooter-"+e.id+"'><button class='btn btn-ghost' onclick='cancelEdit("+e.id+")'>Cancel</button><button class='btn btn-primary' onclick='saveEntry("+e.id+")'>Save</button></div></div>";
    });
    html+="</div>";
  });
  feed.innerHTML=html;
}
function editEntry(id){document.getElementById("content-"+id).style.display="none";document.getElementById("edit-"+id).style.display="block";document.getElementById("editfooter-"+id).style.display="flex";document.getElementById("edit-"+id).focus()}
function cancelEdit(id){document.getElementById("content-"+id).style.display="block";document.getElementById("edit-"+id).style.display="none";document.getElementById("editfooter-"+id).style.display="none"}
function saveEntry(id){
  var c=document.getElementById("edit-"+id).value.trim();if(!c)return;
  api("PATCH","/api/journal/"+id,{content:c}).then(function(u){var i=journalEntries.findIndex(function(e){return e.id===id});if(i>-1)journalEntries[i]=u;renderJournal()}).catch(function(e){alert(e.message)});
}
function deleteEntry(id){
  if(!confirm("Delete this entry?"))return;
  api("DELETE","/api/journal/"+id).then(function(){journalEntries=journalEntries.filter(function(e){return e.id!==id});renderJournal()}).catch(function(e){alert(e.message)});
}

document.getElementById("shelfGrid").addEventListener("click",function(e){

  if(star){
    e.stopPropagation();
    var wrap=star.closest(".rating-wrap");
    var idx=parseInt(wrap.getAttribute("data-i"));
    var v=parseInt(star.getAttribute("data-v"));
    books[idx].rating=books[idx].rating===v?0:v;
    wrap.querySelectorAll(".star").forEach(function(s,i){s.classList.toggle("filled",i<books[idx].rating)});
    api("PATCH","/api/books/"+books[idx].id,{rating:books[idx].rating}).catch(function(){});
    return;
  }
  var card=e.target.closest&&e.target.closest(".book-card");
  if(card) openModal(parseInt(card.getAttribute("data-i")));
});
document.querySelectorAll(".filter-btn").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");currentFilter=btn.getAttribute("data-filter");
    renderGrid();renderShelfRoom();
  });
});
document.getElementById("searchInput").addEventListener("input",function(){currentSearch=this.value.trim();renderGrid();renderShelfRoom()});
document.getElementById("sortSelect").addEventListener("change",function(){currentSort=this.value;renderGrid();renderShelfRoom()});
document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal()});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});
document.getElementById("loginPass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
document.getElementById("signupEmail").addEventListener("keydown",function(e){if(e.key==="Enter")doSignup()});

// ── INIT ──
if(token){
  api("GET","/api/auth/me").then(function(d){
    currentUser=d.username;
    document.getElementById("navUsername").textContent=currentUser;
    document.getElementById("authScreen").classList.remove("active");
    document.getElementById("appScreen").style.display="block";
    loadAll();
  }).catch(function(){logout()});
}
</script>
</body>
