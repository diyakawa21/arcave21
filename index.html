<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arcave · library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0d12;--paper:#f5f2eb;--ash:#c4bfb3;--smoke:#7a7570;--accent:#c4783a;
  --surface:#12121a;--surface2:#16161f;--border:#2a2a38;--border2:#1e1e2a;
  --spine-w:36px;--spine-h:220px;
}
[data-theme="light"]{
  --ink:#f0ece3;--paper:#1a1a2e;--ash:#4a4560;--smoke:#8a8590;--accent:#c4783a;
  --surface:#e8e4db;--surface2:#dedad0;--border:#ccc8be;--border2:#d4d0c6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:"EB Garamond",Georgia,serif;font-size:16px;min-height:100vh}

.auth-screen{display:none;position:fixed;inset:0;z-index:500;background:var(--ink);align-items:center;justify-content:center;padding:20px}
.auth-screen.active{display:flex}
.auth-box{width:100%;max-width:380px}
.auth-logo{font-family:"Space Mono",monospace;font-size:22px;font-weight:700;letter-spacing:.12em;color:var(--accent);margin-bottom:4px}
.auth-logo span{color:var(--ash);font-weight:400}
.auth-sub{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;margin-bottom:36px}
.auth-tabs{display:flex;border-bottom:1px solid #2a2a38;margin-bottom:24px}
.auth-tab{font-family:"Space Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:8px 20px;cursor:pointer;color:var(--smoke);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-field label{display:block;font-family:"Space Mono",monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.auth-field input{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:"Space Mono",monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s}
.auth-field input:focus{border-color:var(--accent)}
.auth-field input::placeholder{color:#3a3a4a}
.auth-btn{background:var(--accent);border:none;border-radius:4px;color:#fff;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:12px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.auth-btn:hover{opacity:.85}
.auth-error{font-family:"Space Mono",monospace;font-size:10px;color:#e06b6b;background:rgba(224,107,107,.08);border:1px solid rgba(224,107,107,.2);border-radius:3px;padding:8px 12px;display:none;margin-bottom:4px}
.auth-error.show{display:block}

nav{position:sticky;top:0;z-index:100;background:rgba(13,13,18,.97);backdrop-filter:blur(8px);border-bottom:1px solid #2a2a38;padding:0 20px;display:flex;align-items:center;gap:14px;height:56px}
.nav-brand{font-family:"Space Mono",monospace;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
.nav-brand span{color:var(--ash);font-weight:400}
.search-wrap{flex:1;max-width:360px;position:relative;min-width:80px}
.search-wrap input{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:"Space Mono",monospace;font-size:12px;padding:8px 12px 8px 32px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--smoke)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--smoke);font-size:14px;pointer-events:none}
.nav-filters{display:flex;gap:3px}
.filter-btn{background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:5px 8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--ash);color:var(--paper)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-journal-btn{font-family:"Space Mono",monospace;font-size:10px;background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);padding:5px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;white-space:nowrap}
.nav-journal-btn:hover,.nav-journal-btn.active{background:rgba(196,120,58,.1);border-color:var(--accent);color:var(--accent)}
.nav-username{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.06em}
.nav-logout{font-family:"Space Mono",monospace;font-size:9px;color:#4a4a5a;background:none;border:1px solid #2a2a38;border-radius:3px;padding:4px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.nav-logout:hover{border-color:var(--smoke);color:var(--ash)}

.stats-bar{background:#12121a;border-bottom:1px solid #1e1e2a;padding:10px 20px;display:flex;gap:18px;align-items:center;font-family:"Space Mono",monospace;overflow-x:auto}
.stat{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.stat-n{font-size:20px;font-weight:700;line-height:1}
.stat-l{color:var(--smoke);text-transform:uppercase;letter-spacing:.07em;font-size:9px}
.s-read{color:#4caf82}.s-reading{color:#d4a459}.s-owned{color:#9b7ec8}.s-want{color:#5b9bd5}.s-buy{color:#e06b8b}
.stats-div{width:1px;height:30px;background:#2a2a38;flex-shrink:0}
.sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0}
.sort-wrap select{background:#1a1a25;border:1px solid #2a2a38;border-radius:3px;color:var(--paper);font-family:"Space Mono",monospace;font-size:10px;padding:4px 8px;outline:none;cursor:pointer}

main{padding:22px 20px 80px}
.result-info{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.shelf-grid{display:grid;grid-template-columns:repeat(auto-fill,var(--spine-w));gap:18px 12px}
.book-card{width:var(--spine-w);cursor:pointer}
.cover-wrap{width:var(--spine-w);height:var(--spine-h);position:relative;border-radius:3px 6px 6px 3px;overflow:hidden;box-shadow:-2px 2px 0 #000,3px 6px 18px rgba(0,0,0,.6);transition:transform .2s,box-shadow .2s}
.book-card:hover .cover-wrap{transform:translateY(-4px) rotate(-1deg);box-shadow:-2px 2px 0 #000,6px 14px 28px rgba(0,0,0,.7)}
.cover-img{width:100%;height:100%;object-fit:cover;display:block}
.cover-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center}
.ph-title{font-family:"EB Garamond",serif;font-style:italic;font-size:13px;line-height:1.35;color:rgba(255,255,255,.9);margin-bottom:6px}
.ph-author{font-family:"Space Mono",monospace;font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}
.cover-wrap::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:rgba(0,0,0,.35);z-index:2}
.status-dot{position:absolute;top:6px;right:6px;z-index:3;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,.4)}
.status-dot.read{background:#4caf82}
.status-dot.reading{background:#d4a459}
.status-dot.unread{background:rgba(255,255,255,.2)}
.owned-dot{position:absolute;top:6px;left:12px;z-index:3;width:8px;height:8px;border-radius:50%;background:#9b7ec8;border:1.5px solid rgba(0,0,0,.4)}
.reread-badge{position:absolute;top:6px;left:12px;z-index:3;background:var(--accent);color:#fff;font-family:"Space Mono",monospace;font-size:7px;padding:2px 4px;border-radius:2px}
.rating-wrap{position:absolute;bottom:5px;left:0;right:0;display:flex;justify-content:center;gap:2px;z-index:3}
.star{font-size:9px;cursor:pointer;color:rgba(255,255,255,.15);line-height:1}
.star.filled{color:#f0c040}
.rating-wrap:hover .star{color:#f0c040}
.rating-wrap .star:hover ~ .star{color:rgba(255,255,255,.15) !important}
.book-meta{padding:7px 2px 0}
.book-title-sm{font-family:"EB Garamond",serif;font-style:italic;font-size:12px;line-height:1.3;color:var(--ash);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-author-sm{font-family:"Space Mono",monospace;font-size:9px;color:var(--smoke);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

.ph-0{background:linear-gradient(145deg,#1a2a4a,#2d1a4a)}.ph-1{background:linear-gradient(145deg,#2a1a1a,#4a1a2a)}
.ph-2{background:linear-gradient(145deg,#1a2a1a,#1a3a2a)}.ph-3{background:linear-gradient(145deg,#2a2a1a,#3a2a0a)}
.ph-4{background:linear-gradient(145deg,#1a1a3a,#0a1a4a)}.ph-5{background:linear-gradient(145deg,#2a1a2a,#1a0a3a)}
.ph-6{background:linear-gradient(145deg,#1a3030,#0a2030)}.ph-7{background:linear-gradient(145deg,#302010,#201000)}
.ph-8{background:linear-gradient(145deg,#201a30,#100a28)}.ph-9{background:linear-gradient(145deg,#0a2020,#0a3030)}

.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#16161f;border:1px solid #2a2a38;border-radius:8px;max-width:680px;width:100%;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{display:flex;gap:20px;padding:24px;border-bottom:1px solid #1e1e2a}
.modal-cover-el{width:90px;height:135px;flex-shrink:0;border-radius:2px 5px 5px 2px;object-fit:cover;box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5)}
.modal-cover-ph{width:90px;height:135px;flex-shrink:0;border-radius:2px 5px 5px 2px;display:flex;align-items:center;justify-content:center;font-family:"EB Garamond",serif;font-style:italic;font-size:10px;color:rgba(255,255,255,.7);text-align:center;padding:8px;box-shadow:-2px 2px 0 #000,3px 6px 12px rgba(0,0,0,.5)}
.modal-title-block{flex:1;min-width:0}
.modal-title{font-size:22px;font-style:italic;line-height:1.2;margin-bottom:4px}
.modal-author{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.modal-meta-row{font-family:"Space Mono",monospace;font-size:9px;color:#4a4a5a;margin-bottom:12px}
.modal-status-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.status-pill{font-family:"Space Mono",monospace;font-size:9px;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.status-pill.read{background:rgba(74,176,120,.15);color:#4caf82;border-color:rgba(74,176,120,.3)}
.status-pill.reading{background:rgba(212,164,89,.15);color:#d4a459;border-color:rgba(212,164,89,.3)}
.status-pill:hover{opacity:.75}
.owned-toggle{display:flex;gap:6px;align-items:center;margin-top:10px}
.owned-toggle label{font-family:"Space Mono",monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em}
.owned-btn{font-family:"Space Mono",monospace;font-size:9px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1.5px solid #2a2a38;background:none;color:var(--smoke);transition:all .15s}
.owned-btn.active{background:rgba(155,126,200,.15);color:#9b7ec8;border-color:rgba(155,126,200,.3)}
.owned-btn:hover{border-color:var(--ash)}
.reread-count{font-family:"Space Mono",monospace;font-size:9px;color:var(--accent);background:rgba(196,120,58,.1);border:1px solid rgba(196,120,58,.25);border-radius:20px;padding:3px 9px}
.modal-stars-label{font-family:"Space Mono",monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.modal-stars{display:flex;gap:3px}
.modal-star{font-size:20px;cursor:pointer;color:rgba(255,255,255,.12)}
.modal-star.filled{color:#f0c040}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.field-group label{display:block;font-family:"Space Mono",monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.field-group textarea,.field-group input[type=text]{width:100%;background:#1a1a25;border:1px solid #2a2a38;border-radius:4px;color:var(--paper);font-family:"EB Garamond",serif;font-size:15px;padding:9px 11px;outline:none;resize:vertical;transition:border-color .2s;line-height:1.5}
.field-group textarea:focus,.field-group input[type=text]:focus{border-color:var(--accent)}
.gr-review-box{background:#0f1018;border:1px solid #1e1e2a;border-radius:4px;padding:10px 12px;font-family:"EB Garamond",serif;font-style:italic;font-size:14px;color:#7a7a9a;line-height:1.5}
.gr-label{font-family:"Space Mono",monospace;font-size:9px;color:#3a3a5a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.dates-row{display:flex;gap:12px}
.dates-row .field-group{flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid #1e1e2a;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn{font-family:"Space Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:8px 16px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .15s}
.btn-ghost{background:none;border-color:#2a2a38;color:var(--ash)}
.btn-ghost:hover{border-color:var(--ash);color:var(--paper)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-reread{background:none;border-color:rgba(196,120,58,.4);color:var(--accent)}
.btn-reread:hover{background:rgba(196,120,58,.1)}
.btn-danger{background:none;border-color:rgba(200,60,60,.3);color:#c84444;margin-right:auto}
.btn-danger:hover{background:rgba(200,60,60,.1)}

#journalView{display:none;padding:0 0 80px}
.journal-header{padding:28px 24px 20px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid #1e1e2a}
.journal-title{font-size:28px;font-style:italic;color:var(--paper)}
.journal-count{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em}
.journal-composer{margin:24px 24px 0;background:#12121a;border:1px solid #2a2a38;border-radius:6px;overflow:hidden;transition:border-color .2s}
.journal-composer:focus-within{border-color:rgba(196,120,58,.4)}
.composer-book-tag{padding:10px 14px 0;display:flex;align-items:center;gap:8px}
.composer-book-tag select{background:#1a1a25;border:1px solid #2a2a38;border-radius:3px;color:var(--ash);font-family:"Space Mono",monospace;font-size:10px;padding:4px 8px;outline:none;max-width:260px;cursor:pointer}
.composer-book-tag label{font-family:"Space Mono",monospace;font-size:9px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em}
.composer-textarea{width:100%;background:transparent;border:none;color:var(--paper);font-family:"EB Garamond",serif;font-size:17px;padding:14px 16px;outline:none;resize:none;line-height:1.65;min-height:120px}
.composer-textarea::placeholder{color:#2e2e3a}
.composer-footer{padding:8px 12px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #1e1e2a}
.composer-char{font-family:"Space Mono",monospace;font-size:9px;color:var(--smoke);align-self:center;margin-right:auto}
.journal-feed{padding:24px 24px 0;display:flex;flex-direction:column;gap:16px}
.journal-entry{background:#12121a;border:1px solid #1e1e2a;border-radius:6px;overflow:hidden}
.journal-entry:hover{border-color:#2a2a38}
.entry-meta{padding:12px 16px 0;display:flex;align-items:center;gap:10px}
.entry-date{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.07em}
.entry-book-tag{font-family:"Space Mono",monospace;font-size:9px;color:var(--accent);background:rgba(196,120,58,.08);border:1px solid rgba(196,120,58,.15);border-radius:20px;padding:2px 8px}
.entry-actions{margin-left:auto;display:flex;gap:6px;opacity:0;transition:opacity .15s}
.journal-entry:hover .entry-actions{opacity:1}
.entry-act-btn{font-family:"Space Mono",monospace;font-size:9px;background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--smoke);padding:3px 7px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.entry-act-btn:hover{border-color:var(--ash);color:var(--ash)}
.entry-act-btn.del:hover{border-color:#c84444;color:#c84444}
.entry-content{padding:10px 16px 16px;font-size:16px;line-height:1.7;color:var(--paper);white-space:pre-wrap;word-break:break-word}
.entry-edit-area{width:100%;background:transparent;border:none;border-top:1px solid #1e1e2a;color:var(--paper);font-family:"EB Garamond",serif;font-size:16px;padding:12px 16px;outline:none;resize:none;line-height:1.7;display:none}
.entry-edit-footer{padding:8px 12px;border-top:1px solid #1e1e2a;display:none;justify-content:flex-end;gap:8px}
.journal-empty{padding:60px 24px;text-align:center;color:var(--smoke);font-style:italic;font-size:18px}

.fab-wrap{position:fixed;bottom:24px;right:24px;z-index:150;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:22px;box-shadow:0 4px 18px rgba(196,120,58,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fab:hover{transform:scale(1.08)}
.fab-sm{font-family:"Space Mono",monospace;font-size:9px;background:rgba(13,13,18,.9);border:1px solid #2a2a38;color:var(--smoke);padding:5px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.fab-sm:hover{border-color:var(--ash);color:var(--ash)}

.empty,.loading{grid-column:1/-1;padding:60px 0;text-align:center;color:var(--smoke);font-style:italic;font-size:18px}
.loading{font-family:"Space Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-style:normal}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px}

@media(max-width:640px){
  :root{--spine-w:110px;--spine-h:165px}
  nav{gap:8px;padding:0 12px}
  .nav-filters{display:none}
  main{padding:14px 14px 80px}
}

.scanner-overlay{display:none;position:fixed;inset:0;z-index:300;background:#000;flex-direction:column;align-items:center;justify-content:center}
.scanner-overlay.open{display:flex}
.scanner-video{width:100%;max-width:500px;border-radius:8px}
.scanner-frame{position:absolute;width:260px;height:120px;border:2px solid var(--accent);border-radius:4px;box-shadow:0 0 0 9999px rgba(0,0,0,.6)}
.scanner-line{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);animation:scan 2s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}
.scanner-label{margin-top:24px;font-family:"Space Mono",monospace;font-size:11px;color:var(--ash);text-transform:uppercase;letter-spacing:.1em}
.scanner-close{margin-top:16px;font-family:"Space Mono",monospace;font-size:10px;background:none;border:1px solid #2a2a38;border-radius:3px;color:var(--smoke);padding:7px 18px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em}
.scanner-close:hover{border-color:var(--ash);color:var(--ash)}
.book-preview{background:#16161f;border:1px solid #2a2a38;border-radius:8px;padding:20px;max-width:400px;width:90%;margin-top:20px;display:none}
.book-preview.show{display:block}
.preview-cover{width:60px;height:90px;object-fit:cover;border-radius:3px;float:left;margin-right:14px;box-shadow:-1px 1px 0 #000,2px 4px 8px rgba(0,0,0,.5)}
.preview-title{font-size:16px;font-style:italic;color:var(--paper);margin-bottom:4px}
.preview-author{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;margin-bottom:12px}
.preview-meta{font-family:"Space Mono",monospace;font-size:9px;color:#4a4a5a;margin-bottom:14px}
.preview-btns{display:flex;gap:8px;clear:both;padding-top:8px}
.add-method-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.add-method-overlay.open{display:flex}
.add-method-box{background:#16161f;border:1px solid #2a2a38;border-radius:8px;padding:28px;max-width:340px;width:90%;text-align:center}
.add-method-title{font-size:20px;font-style:italic;color:var(--paper);margin-bottom:6px}
.add-method-sub{font-family:"Space Mono",monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:24px}
.add-method-btns{display:flex;flex-direction:column;gap:10px}
.method-btn{font-family:"Space Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:13px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .15s}
.method-scan{background:var(--accent);border-color:var(--accent);color:#fff}
.method-scan:hover{opacity:.85}
.method-manual{background:none;border-color:#2a2a38;color:var(--ash)}
.method-manual:hover{border-color:var(--ash);color:var(--paper)}
.method-isbn{background:none;border-color:#2a2a38;color:var(--ash)}
.method-isbn:hover{border-color:var(--ash);color:var(--paper)}

/* ── THEME TRANSITIONS ── */
body{transition:background .2s,color .2s}
nav,
.stats-bar,
.modal,
.journal-composer,
.journal-entry,
.auth-box,
.add-method-box{transition:background .2s,border-color .2s}

/* ── SHELF ROOM VIEW ── */
.shelf-container{display:none;padding:0 0 80px}
.shelf-container.active{display:block}
.shelf-room{padding:0}
.shelf-section{margin-bottom:0}
.shelf-section-header{
  padding:28px 28px 10px;
  display:flex;align-items:baseline;gap:14px;
}
.shelf-section-name{
  font-family:"EB Garamond",serif;
  font-size:24px;font-style:italic;
  color:var(--paper);
}
[data-theme="light"] .shelf-section-name{color:#1a1a2e}
.shelf-section-count{
  font-family:"Space Mono",monospace;
  font-size:9px;color:var(--smoke);
  text-transform:uppercase;letter-spacing:.1em;
}
.shelf-plank{
  display:flex;
  align-items:flex-end;
  padding:6px 28px 0;
  min-height:calc(var(--spine-h) + 20px);
  background:linear-gradient(
    to bottom,
    transparent calc(var(--spine-h) + 6px),
    #4a3218 calc(var(--spine-h) + 6px),
    #3a2510 calc(var(--spine-h) + 14px),
    #2a1a08 calc(var(--spine-h) + 20px)
  );
  border-left:8px solid #2a1a08;
  border-right:8px solid #2a1a08;
  flex-wrap:nowrap;
  overflow-x:auto;
  gap:1px;
  scrollbar-width:thin;
}
[data-theme="light"] .shelf-plank{
  background:linear-gradient(
    to bottom,
    transparent calc(var(--spine-h) + 6px),
    #8B6914 calc(var(--spine-h) + 6px),
    #7a5a10 calc(var(--spine-h) + 14px),
    #6a4a08 calc(var(--spine-h) + 20px)
  );
  border-left:8px solid #6a4a08;
  border-right:8px solid #6a4a08;
}
.shelf-plank::-webkit-scrollbar{height:3px}
.shelf-plank::-webkit-scrollbar-thumb{background:#3a2510;border-radius:2px}
.shelf-section-divider{
  height:1px;
  background:linear-gradient(to right,transparent,var(--border),transparent);
  margin:20px 28px 0;
}

/* ── SPINE ── */
.spine-book{
  width:var(--spine-w);
  min-width:var(--spine-w);
  height:var(--spine-h);
  flex-shrink:0;
  cursor:pointer;
  position:relative;
  border-radius:2px 2px 0 0;
  overflow:hidden;
  transition:transform .15s,filter .15s;
  box-shadow:2px 0 3px rgba(0,0,0,.5),inset -2px 0 4px rgba(0,0,0,.3),inset 1px 0 2px rgba(255,255,255,.06);
}
.spine-book:hover{
  transform:translateY(-10px);
  filter:brightness(1.15);
  z-index:2;
}
.spine-book::after{
  content:"";
  position:absolute;
  top:0;left:0;
  width:4px;height:100%;
  background:rgba(0,0,0,.3);
}
.spine-title{
  position:absolute;
  top:10px;left:0;
  width:var(--spine-w);
  height:calc(var(--spine-h) - 36px);
  writing-mode:vertical-lr;
  text-orientation:mixed;
  transform:rotate(180deg);
  font-family:"EB Garamond",serif;
  font-style:italic;
  font-size:12px;
  color:rgba(255,255,255,.92);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  letter-spacing:.04em;
  line-height:var(--spine-w);
  text-shadow:0 1px 2px rgba(0,0,0,.5);
}
.spine-author{
  position:absolute;
  bottom:18px;left:0;
  width:var(--spine-w);
  height:60px;
  writing-mode:vertical-lr;
  text-orientation:mixed;
  transform:rotate(180deg);
  font-family:"Space Mono",monospace;
  font-size:7px;
  color:rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;white-space:nowrap;
  text-transform:uppercase;letter-spacing:.08em;
  line-height:var(--spine-w);
}
.spine-status{
  position:absolute;
  bottom:5px;left:50%;
  transform:translateX(-50%);
  width:5px;height:5px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,.3);
}
.spine-status.read{background:#4caf82}
.spine-status.reading{background:#d4a459}
.spine-status.unread{background:rgba(255,255,255,.15)}
.spine-owned-dot{
  position:absolute;top:5px;left:50%;
  transform:translateX(-50%);
  width:5px;height:5px;
  border-radius:50%;background:#9b7ec8;
}

</style>
</head>
<body>

  <div class="auth-box">

    <div class="auth-sub">your personal book shelf</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign in</div>
      <div class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create account</div>

      <div class="auth-field"><label>Password</label><input type="password" id="signupPass" placeholder="at least 6 characters" autocomplete="new-password"></div>

<div id="appScreen" style="display:none">
  <nav>

    <div class="search-wrap">

      <button class="nav-journal-btn" id="viewToggle" onclick="toggleView()" title="Toggle view">&#9783; Shelf</button>

  <div class="stats-bar" id="statsBar">

    <div class="stat"><div class="stat-n s-owned" id="sOwned">0</div><div class="stat-l">Owned</div></div>
    <div class="stat"><div class="stat-n" id="sUnread" style="color:#7c8fd0">0</div><div class="stat-l">Unread</div></div>
    <div class="stats-div"></div>
    <div class="stat"><div class="stat-n" id="sRated" style="color:#f0c040">0</div><div class="stat-l">Rated</div></div>
    <div class="stat"><div class="stat-n" id="sAvg" style="color:#f0c040">-</div><div class="stat-l">Avg</div></div>
    <div class="sort-wrap">Sort:
      <select id="sortSelect">
        <option value="author">Author A-Z</option>

  <div id="libraryView">

  <div id="journalView">

<div class="add-method-overlay" id="addMethodOverlay">

      <button class="method-btn method-isbn" onclick="addByISBN()">Type ISBN</button>

<script>
var API = "https://arcave21.up.railway.app";

var STATUS_LABELS = {read:"Read",reading:"Reading",unread:"Unread"};
var STATUS_CYCLE = ["unread","reading","read"];
var STATUS_ORDER = {read:0,reading:1,"owned-unread":2,"want-to-read":3,"want-to-buy":4,unread:5};
var PALETTE = ["ph-0","ph-1","ph-2","ph-3","ph-4","ph-5","ph-6","ph-7","ph-8","ph-9"];

function hashColor(s){var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return PALETTE[Math.abs(h)%PALETTE.length]}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(iso){if(!iso)return"";var d=new Date(iso);return d.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
function fmtTime(iso){if(!iso)return"";var d=new Date(iso);return d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}

var token=localStorage.getItem("arcave_token");
var currentUser=localStorage.getItem("arcave_user");
var books=[];
var journalEntries=[];
var currentFilter="all";
var currentSearch="";
var currentSort="author";
var openIdx=null;
var showingJournal=false;

function api(method,path,body){
  var opts={method:method,headers:{"Content-Type":"application/json"}};
  if(token) opts.headers["Authorization"]="Bearer "+token;
  if(body) opts.body=JSON.stringify(body);
  return fetch(API+path,opts).then(function(res){
    return res.json().then(function(data){
      if(!res.ok) throw new Error(data.error||"Request failed");
      return data;
    });
  });
}

function switchTab(tab){
  document.getElementById("tabLogin").classList.toggle("active",tab==="login");
  document.getElementById("tabSignup").classList.toggle("active",tab==="signup");
  document.getElementById("loginForm").style.display=tab==="login"?"flex":"none";
  document.getElementById("signupForm").style.display=tab==="signup"?"flex":"none";
  document.getElementById("authError").classList.remove("show");
}

function showAuthError(msg){
  var el=document.getElementById("authError");
  el.textContent=msg;
  el.classList.add("show");
}

function doLogin(){
  var username=document.getElementById("loginUser").value.trim();
  var password=document.getElementById("loginPass").value;
  if(!username||!password){showAuthError("Fill in both fields");return}
  api("POST","/api/auth/login",{username:username,password:password}).then(onLogin).catch(function(e){showAuthError(e.message)});
}

function doSignup(){
  var username=document.getElementById("signupUser").value.trim();
  var password=document.getElementById("signupPass").value;
  var email=document.getElementById("signupEmail").value.trim();
  if(!username||!password){showAuthError("Fill in username and password");return}
  api("POST","/api/auth/signup",{username:username,password:password,email:email}).then(onLogin).catch(function(e){showAuthError(e.message)});
}

function onLogin(data){
  token=data.token;
  currentUser=data.username;
  localStorage.setItem("arcave_token",token);
  localStorage.setItem("arcave_user",currentUser);
  document.getElementById("navUsername").textContent=currentUser;
  document.getElementById("authScreen").classList.remove("active");
  document.getElementById("appScreen").style.display="block";
  loadAll();
}

function logout(){
  token=null;currentUser=null;books=[];journalEntries=[];
  localStorage.removeItem("arcave_token");
  localStorage.removeItem("arcave_user");
  document.getElementById("appScreen").style.display="none";
  document.getElementById("authScreen").classList.add("active");
  document.getElementById("loginUser").value="";
  document.getElementById("loginPass").value="";
  document.getElementById("authError").classList.remove("show");
}

function loadAll(){
  document.getElementById("shelfGrid").innerHTML="<div class='loading'>Loading your library...</div>";
  Promise.all([api("GET","/api/books"),api("GET","/api/journal")]).then(function(results){
    books=results[0];
    journalEntries=results[1];
    renderStats();
    renderGrid();
    if(currentView === "shelf") renderShelf();
    renderJournal();
    populateBookSelect();
    applyView();
  }).catch(function(e){
    if(e.message.indexOf("expired")>-1||e.message.indexOf("Invalid")>-1) logout();
    else document.getElementById("shelfGrid").innerHTML="<div class='empty'>Could not load. Check connection.</div>";
  });
}

function toggleJournal(){
  showingJournal=!showingJournal;
  document.getElementById("journalView").style.display=showingJournal?"block":"none";
  document.getElementById("libraryView").style.display=showingJournal?"none":"block";
  document.getElementById("statsBar").style.display=showingJournal?"none":"flex";
  document.getElementById("journalToggle").classList.toggle("active",showingJournal);
  document.getElementById("fabBtn").textContent=showingJournal?"*":"+";
  if(showingJournal) document.getElementById("composerText").focus();
}

// fabAction replaced by scanner version

function populateBookSelect(){
  var sel=document.getElementById("composerBook");
  sel.innerHTML="<option value=''>no book</option>";
  var list=books.filter(function(b){return b.status==="reading"||b.status==="read"}).sort(function(a,b){return(a.title||"").localeCompare(b.title||"")});
  list.forEach(function(b){
    var o=document.createElement("option");
    o.value=b.id;
    o.textContent=b.title+(b.author?" - "+b.author:"");
    sel.appendChild(o);
  });
}

document.getElementById("composerText").addEventListener("input",function(){
  document.getElementById("composerChar").textContent=this.value.length+" chars";
});

function clearComposer(){
  document.getElementById("composerText").value="";
  document.getElementById("composerBook").value="";
  document.getElementById("composerChar").textContent="0 chars";
}

function submitEntry(){
  var content=document.getElementById("composerText").value.trim();
  if(!content) return;
  var bookId=document.getElementById("composerBook").value;
  var bookTitle="";
  if(bookId){
    var found=books.find(function(b){return String(b.id)===bookId});
    if(found) bookTitle=found.title;
  }
  api("POST","/api/journal",{content:content,book_id:bookId||null,book_title:bookTitle}).then(function(entry){
    journalEntries.unshift(entry);
    clearComposer();
    renderJournal();
  }).catch(function(e){alert("Failed: "+e.message)});
}

function renderJournal(){
  var count=journalEntries.length;
  document.getElementById("journalCount").textContent=count+" "+(count===1?"entry":"entries");
  var feed=document.getElementById("journalFeed");
  if(!count){feed.innerHTML="<div class='journal-empty'>Your journal is empty. Write your first entry above.</div>";return}
  var groups={};
  journalEntries.forEach(function(e){
    var key=fmtDate(e.created_at);
    if(!groups[key]) groups[key]=[];
    groups[key].push(e);
  });
  var html="";
  Object.keys(groups).forEach(function(date){
    html+="<div style='margin-bottom:4px'><div style='font-family:Space Mono,monospace;font-size:10px;color:var(--smoke);text-transform:uppercase;letter-spacing:.1em;padding:0 2px;margin-bottom:10px'>"+date+"</div>";
    groups[date].forEach(function(e){
      html+="<div class='journal-entry' id='entry-"+e.id+"'><div class='entry-meta'><span class='entry-date'>"+fmtTime(e.created_at)+"</span>"+(e.book_title?"<span class='entry-book-tag'>"+esc(e.book_title)+"</span>":"")+"<div class='entry-actions'><button class='entry-act-btn' onclick='editEntry("+e.id+")'>Edit</button><button class='entry-act-btn del' onclick='deleteEntry("+e.id+")'>Delete</button></div></div><div class='entry-content' id='content-"+e.id+"'>"+esc(e.content)+"</div><textarea class='entry-edit-area' id='edit-"+e.id+"' rows='4'>"+esc(e.content)+"</textarea><div class='entry-edit-footer' id='editfooter-"+e.id+"'><button class='btn btn-ghost' onclick='cancelEdit("+e.id+")'>Cancel</button><button class='btn btn-primary' onclick='saveEntry("+e.id+")'>Save</button></div></div>";
    });
    html+="</div>";
  });
  feed.innerHTML=html;
}

function editEntry(id){
  document.getElementById("content-"+id).style.display="none";
  document.getElementById("edit-"+id).style.display="block";
  document.getElementById("editfooter-"+id).style.display="flex";
  document.getElementById("edit-"+id).focus();
}
function cancelEdit(id){
  document.getElementById("content-"+id).style.display="block";
  document.getElementById("edit-"+id).style.display="none";
  document.getElementById("editfooter-"+id).style.display="none";
}
function saveEntry(id){
  var content=document.getElementById("edit-"+id).value.trim();
  if(!content) return;
  api("PATCH","/api/journal/"+id,{content:content}).then(function(updated){
    var i=journalEntries.findIndex(function(e){return e.id===id});
    if(i>-1) journalEntries[i]=updated;
    renderJournal();
  }).catch(function(e){alert("Failed: "+e.message)});
}
function deleteEntry(id){
  if(!confirm("Delete this entry?")) return;
  api("DELETE","/api/journal/"+id).then(function(){
    journalEntries=journalEntries.filter(function(e){return e.id!==id});
    renderJournal();
  }).catch(function(e){alert("Failed: "+e.message)});
}

function getFiltered(){
  var list=books.map(function(b,i){return Object.assign({},b,{_i:i})});
  if(currentFilter==="owned") list=list.filter(function(b){return b.owned});
  else if(currentFilter==="unowned") list=list.filter(function(b){return !b.owned});
  else if(currentFilter!=="all") list=list.filter(function(b){return b.status===currentFilter});
  if(currentSearch){
    var q=currentSearch.toLowerCase();
    list=list.filter(function(b){return(b.title||"").toLowerCase().indexOf(q)>-1||(b.author||"").toLowerCase().indexOf(q)>-1||(b.genre||"").toLowerCase().indexOf(q)>-1});
  }
  list.sort(function(a,b){
    if(currentSort==="author") return(a.author||"").localeCompare(b.author||"");
    if(currentSort==="title") return(a.title||"").localeCompare(b.title||"");
    if(currentSort==="rating") return(b.rating||0)-(a.rating||0);
    if(currentSort==="year") return(b.year||"0").localeCompare(a.year||"0");
    if(currentSort==="status") return(STATUS_ORDER[a.status]||5)-(STATUS_ORDER[b.status]||5);
    return 0;
  });
  return list;
}

function renderStats(){
  document.getElementById("sTotal").textContent=books.length;
  document.getElementById("sRead").textContent=books.filter(function(b){return b.status==="read"}).length;
  document.getElementById("sReading").textContent=books.filter(function(b){return b.status==="reading"}).length;

function saveModal(){
  if(openIdx===null) return;
  var b=books[openIdx];
  var updates={
    cover:document.getElementById("mCover").value.trim(),
    genre:document.getElementById("mGenre").value.trim(),
    start_date:document.getElementById("mStart").value.trim(),
    finish_date:document.getElementById("mFinish").value.trim(),
    notes_during:document.getElementById("mNotesD").value.trim(),
    notes_after:document.getElementById("mNotesA").value.trim(),
    status:b.status,
    owned:b.owned||false,
    rating:b.rating||0
  };
  if(updates.finish_date&&b.status==="reading") updates.status="read";
  api("PATCH","/api/books/"+b.id,updates).then(function(updated){
    books[openIdx]=Object.assign({},b,updated);
    renderStats();renderGrid();closeModal();
  }).catch(function(e){alert("Save failed: "+e.message)});
}

    renderStats();renderGrid();closeModal();

}

function deleteBook(){

// ── SCANNER ──
var scannedBookData = null;
var scannerStream = null;
var scannerInterval = null;
var scanCanvas = document.createElement("canvas");
var scanCtx = scanCanvas.getContext("2d");

function fabAction(){
  if(showingJournal) document.getElementById("composerText").focus();
  else openAddMethod();
}

function openAddMethod(){
  document.getElementById("addMethodOverlay").classList.add("open");
}
function closeAddMethod(){
  document.getElementById("addMethodOverlay").classList.remove("open");
}

function openScanner(){
  closeAddMethod();
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert("Camera not available on this device or browser. Use Type ISBN or Enter manually instead.");
    return;
  }
  document.getElementById("scannerOverlay").classList.add("open");
  resetScanner();
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(function(stream){
    scannerStream=stream;
    var video=document.getElementById("scannerVideo");
    video.srcObject=stream;
    video.play();
    scannerInterval=setInterval(function(){scanFrame(video)},300);
  }).catch(function(e){
    alert("Could not access camera: "+e.message);
    closeScanner();
  });
}

function closeScanner(){
  if(scannerStream) scannerStream.getTracks().forEach(function(t){t.stop()});
  if(scannerInterval) clearInterval(scannerInterval);
  scannerStream=null;scannerInterval=null;
  document.getElementById("scannerOverlay").classList.remove("open");
  document.getElementById("bookPreview").classList.remove("show");
  scannedBookData=null;
}

function resetScanner(){
  document.getElementById("bookPreview").classList.remove("show");
  document.getElementById("scannerLabel").textContent="Point camera at the barcode";
  scannedBookData=null;
  if(!scannerInterval){
    var video=document.getElementById("scannerVideo");
    if(video.srcObject) scannerInterval=setInterval(function(){scanFrame(video)},300);
  }
}

function scanFrame(video){
  if(!video.videoWidth) return;
  scanCanvas.width=video.videoWidth;
  scanCanvas.height=video.videoHeight;
  scanCtx.drawImage(video,0,0);
  try{
    var imageData=scanCtx.getImageData(0,0,scanCanvas.width,scanCanvas.height);
    // Use BarcodeDetector if available (Chrome/Android)
    if(window.BarcodeDetector){
      var detector=new BarcodeDetector({formats:["ean_13","ean_8","isbn"]});
      detector.detect(scanCanvas).then(function(codes){
        if(codes.length>0) onBarcodeDetected(codes[0].rawValue);
      }).catch(function(){});
    }
  }catch(e){}
}

function onBarcodeDetected(isbn){
  if(scannedBookData) return; // already found one
  if(scannerInterval){clearInterval(scannerInterval);scannerInterval=null;}
  document.getElementById("scannerLabel").textContent="Found: "+isbn+" - Looking up...";
  lookupISBN(isbn);
}

function lookupISBN(isbn){
  isbn=isbn.replace(/[^0-9X]/gi,"");
  fetch("https://www.googleapis.com/books/v1/volumes?q=isbn:"+isbn).then(function(r){return r.json()}).then(function(data){
    if(!data.items||!data.items.length){
      document.getElementById("scannerLabel").textContent="Book not found. Try again.";
      if(scannerStream) scannerInterval=setInterval(function(){scanFrame(document.getElementById("scannerVideo"))},300);
      return;
    }
    var info=data.items[0].volumeInfo;
    scannedBookData={
      title:info.title||"",
      author:(info.authors&&info.authors[0])||"",
      pages:String(info.pageCount||""),
      year:info.publishedDate?info.publishedDate.substring(0,4):"",
      cover:(info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail))||"",
      gr_review:"",genre:(info.categories&&info.categories[0])||""
    };
    showBookPreview(scannedBookData);
  }).catch(function(e){
    document.getElementById("scannerLabel").textContent="Lookup failed. Try again.";
    if(scannerStream) scannerInterval=setInterval(function(){scanFrame(document.getElementById("scannerVideo"))},300);
  });
}

function showBookPreview(b){
  if(b.cover) document.getElementById("previewCover").src=b.cover;
  document.getElementById("previewCover").style.display=b.cover?"block":"none";
  document.getElementById("previewTitle").textContent=b.title;
  document.getElementById("previewAuthor").textContent=b.author;
  var meta=[];
  if(b.year) meta.push(b.year);
  if(b.pages) meta.push(b.pages+" pages");
  document.getElementById("previewMeta").textContent=meta.join(" - ");
  document.getElementById("scannerLabel").textContent="";
  document.getElementById("bookPreview").classList.add("show");
}

function confirmScannedBook(){
  if(!scannedBookData) return;
  closeScanner();
  var b=scannedBookData;
  var dup=books.find(function(bk){return(bk.title||"").toLowerCase()===b.title.toLowerCase()});
  if(dup){alert(b.title+" is already in your library.");return;}
  var sc=prompt("Read status: 1=Unread, 2=Reading, 3=Read","1");
  var statMap={"1":"unread","2":"reading","3":"read"};
  var status=statMap[(sc||"1").trim()]||"unread";
  var ownedAns=prompt("Do you own this book? y/n","y");
  var owned=ownedAns&&ownedAns.toLowerCase().indexOf("y")>-1;
  api("POST","/api/books",{
    title:b.title,author:b.author,status:status,owned:owned,
    pages:b.pages,year:b.year,cover:b.cover,genre:b.genre,
    read_count:status==="read"?1:0,rating:0
  }).then(function(nb){
    books.push(nb);
    renderStats();renderGrid();populateBookSelect();
    openModal(books.length-1,true);
  }).catch(function(e){alert("Failed: "+e.message)});
}

function addByISBN(){
  closeAddMethod();
  var isbn=prompt("Enter ISBN (10 or 13 digits):");
  if(!isbn) return;

function lookupISBNManual(isbn){
  isbn=isbn.replace(/[^0-9X]/gi,"");
  fetch("https://www.googleapis.com/books/v1/volumes?q=isbn:"+isbn).then(function(r){return r.json()}).then(function(data){
    if(!data.items||!data.items.length){alert("Book not found for ISBN: "+isbn);return;}
    var info=data.items[0].volumeInfo;
    scannedBookData={
      title:info.title||"",
      author:(info.authors&&info.authors[0])||"",
      pages:String(info.pageCount||""),
      year:info.publishedDate?info.publishedDate.substring(0,4):"",
      cover:(info.imageLinks&&(info.imageLinks.thumbnail||info.imageLinks.smallThumbnail))||"",
      gr_review:"",genre:(info.categories&&info.categories[0])||""
    };
    confirmScannedBook();
  }).catch(function(e){alert("Lookup failed: "+e.message)});
}

var SPINE_PALETTES = ["sp-0","sp-1","sp-2","sp-3","sp-4","sp-5","sp-6","sp-7","sp-8","sp-9"];

function spineColor(s){
  var h=0;
  for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0;
  return SPINE_PALETTES[Math.abs(h)%SPINE_PALETTES.length];
}

};
var GENRE_ORDER = [
  "Classic Literature","Literary Fiction","Contemporary Fiction","Historical Fiction",
  "Young Adult","Romance","Thriller & Mystery","Horror & Dark Fiction",
  "Science Fiction","Fantasy","Non-Fiction","Psychology & Self-Help",
  "Poetry & Essays","Graphic Novel & Manga","Unsorted"
];

function assignGenre(b){
  if(b.genre && b.genre.trim()) return b.genre.trim();
  var haystack = ((b.title||"") + " " + (b.author||"")).toLowerCase();
  for(var genre in GENRE_RULES){
    var keywords = GENRE_RULES[genre];
    for(var k=0;k<keywords.length;k++){
      if(haystack.indexOf(keywords[k].toLowerCase()) > -1) return genre;
    }
  }
  return "Unsorted";
}

function renderShelf(){
  var list = getFiltered();
  document.getElementById("resultInfo").textContent = list.length + " book" + (list.length!==1?"s":"") + " shown";
  var container = document.getElementById("shelfContainer");
  if(!list.length){container.innerHTML="<div class='empty'>No books found.</div>";return}

  // Group by genre
  var grouped = {};
  GENRE_ORDER.forEach(function(g){grouped[g]=[]});
  list.forEach(function(b){
    var g = assignGenre(b);
    if(!grouped[g]) grouped[g]=[];
    grouped[g].push(b);
  });

  var roomHtml = "<div class='shelf-room'>";
  GENRE_ORDER.forEach(function(genre){
    var books = grouped[genre];
    if(!books||!books.length) return;
    var shelfColor = GENRE_COLORS[genre] || GENRE_COLORS["Unsorted"];

    roomHtml += "<div class='shelf-section'>";
    roomHtml += "<div class='shelf-section-header'>";
    roomHtml += "<div class='shelf-section-name'>" + genre + "</div>";
    roomHtml += "<div class='shelf-section-count'>" + books.length + " book" + (books.length!==1?"s":"") + "</div>";
    roomHtml += "</div>";

    // Split into rows of 25
    var BOOKS_PER_ROW = 25;
    for(var r=0;r<books.length;r+=BOOKS_PER_ROW){
      var row = books.slice(r, r+BOOKS_PER_ROW);
      roomHtml += "<div class='shelf-plank'>";
      row.forEach(function(b){
        roomHtml += "<div class='spine-book' data-i='" + b._i + "' style='background:" + shelfColor + "' title='" + esc(b.title) + " — " + esc(b.author) + "'>";
        roomHtml += "<div class='spine-title'>" + esc(b.title) + "</div>";
        if(b.author) roomHtml += "<div class='spine-author'>" + esc(b.author.split(" ").pop()) + "</div>";
        roomHtml += "<div class='spine-status " + (b.status||"unread") + "'></div>";
        if(b.owned) roomHtml += "<div class='spine-owned-dot'></div>";
        roomHtml += "</div>";
      });
      roomHtml += "</div>";
    }
    roomHtml += "<div class='shelf-section-divider'></div></div>";
  });
  roomHtml += "</div>";
  container.innerHTML = roomHtml;

  container.querySelectorAll(".spine-book").forEach(function(el){
    el.addEventListener("click",function(){
      openModal(parseInt(this.getAttribute("data-i")));
    });
  });
}


// Override renderGrid to also update shelf if in shelf view
var _origRenderGrid = renderGrid;
renderGrid = function(){
  _origRenderGrid();
  if(currentView === "shelf") renderShelf();
};

// Init view on load
applyView();
